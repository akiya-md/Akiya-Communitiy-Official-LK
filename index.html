<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026 v2.0 PRO</title>
    
    <link rel="icon" type="image/png" href="dragon.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff1100; --black: #000000; --dark: #0a0a0a; --gold: #ffd700; --glass: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--black); color: white; 
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        /* 🔥 FIRE BACKGROUND */
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.8; }

        /* 🐲 MAIN LOGO ANIMATION */
        .main-dragon-logo { width: 120px; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 0 15px var(--red)); margin-bottom: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        nav { position: fixed; top: 0; width: 100%; background: var(--glass); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 1000; border-bottom: 2px solid var(--red); box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        
        .section { display: none; padding: 100px 15px 60px; min-height: 100vh; }
        .active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 💎 TOKEN & STATS */
        .stats-bar { background: #111; padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold); display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; }

        /* 🃏 ADVANCED LINK CARDS */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1300px; margin: auto; }
        .link-card { 
            background: linear-gradient(145deg, #111, #050505); border: 1px solid #333; padding: 15px; border-radius: 20px; 
            position: relative; overflow: hidden; transition: 0.4s;
        }
        .link-card:hover { border-color: var(--red); transform: scale(1.03); box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .card-dragon-icon { position: absolute; top: 10px; right: 10px; width: 30px; opacity: 0.5; filter: grayscale(1); }
        .link-card:hover .card-dragon-icon { opacity: 1; filter: grayscale(0); }
        .link-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; border: 1px solid #222; }

        /* 🔒 BLOCK SCREEN */
        #block-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .glow-btn { padding: 12px 24px; background: transparent; border: 2px solid var(--red); color: var(--red); font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: 0 0 20px var(--red); }

        /* ⌨️ TYPING SLOGAN */
        #slogan-text { color: var(--gold); font-size: 14px; font-weight: bold; letter-spacing: 2px; height: 20px; margin-bottom: 20px; }

        footer { text-align: center; padding: 40px; background: #050505; border-top: 1px solid #222; font-size: 13px; color: #555; }
    </style>
</head>
<body>

    <canvas id="fire-canvas"></canvas>

    <div id="block-screen">
        <img src="dragon.png" width="100">
        <h1 style="color:red;">YOU ARE BLOCKED!</h1>
        <p>නීති උල්ලංඝනය කිරීම නිසා ඔබව තාවකාලිකව තහනම් කර ඇත.</p>
        <div id="block-timer" style="font-size: 30px; color: gold;">00:00:00</div>
    </div>

    <div id="login-screen" class="section active">
        <div style="text-align:center; max-width:400px; margin:auto;">
            <img src="dragon.png" class="main-dragon-logo">
            <div id="slogan-text"></div>
            <div style="background:var(--glass); padding:30px; border-radius:20px; border:1px solid var(--red);">
                <input type="text" id="user-id" class="glow-btn" style="width:100%; text-align:left; border-radius:10px;" placeholder="Username">
                <input type="password" id="user-pass" class="glow-btn" style="width:100%; text-align:left; border-radius:10px;" placeholder="Password">
                <button class="glow-btn" style="width:100%; background:var(--red); color:white;" onclick="proLogin()">LOGIN PRO</button>
                <p>OR</p>
                <button id="google-btn" class="glow-btn" style="width:100%; border-color:#4285F4; color:#4285F4;">
                    <i class="fab fa-google"></i> SIGN IN WITH GOOGLE
                </button>
            </div>
        </div>
    </div>

    <nav id="main-nav" style="display:none;">
        <div style="color:red; font-weight:bold;"><img src="dragon.png" width="25"> AKIYA 龍</div>
        <div class="stats-bar"><i class="fas fa-coins text-gold"></i> <span id="user-tokens">0</span> DRAGONS</div>
        <img id="nav-pfp" onclick="showPage('profile')" style="width:35px; border-radius:50%; border:2px solid red; cursor:pointer;">
    </nav>

    <div id="home" class="section">
        <div style="text-align:center;">
            <input type="text" id="search-bar" class="glow-btn" style="width:80%; max-width:600px; border-radius:50px; text-align:center;" placeholder="🔍 Search Premium Groups..." onkeyup="searchLinks()">
        </div>
        <br>
        <div class="link-grid" id="home-grid"></div>
    </div>

    <div id="profile" class="section">
        <div style="max-width:600px; margin:auto; background:var(--glass); padding:30px; border-radius:25px; border:1px solid var(--red); text-align:center;">
            <img id="prof-img" src="dragon.png" style="width:120px; border-radius:50%; border:3px solid red;">
            <h2 id="prof-name">User Name</h2>
            <p id="prof-email" style="color:#666;"></p>
            <hr style="border-color:#222;">
            <h4>💬 MESSAGE ADMIN</h4>
            <textarea id="admin-msg" class="glow-btn" style="width:100%; height:80px; border-radius:10px; color:white;" placeholder="Type your message here..."></textarea>
            <button class="glow-btn" onclick="sendMessage()">SEND TO KAVIAKIYA</button>
            <br><br>
            <button class="glow-btn" style="border-color:gold; color:gold;" onclick="showPage('shop')">REDEEM TOKENS</button>
            <button class="glow-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <footer>
        <div style="color:red; font-weight:bold;">𝐀𝐊𝐈𝐘𝐀 龍 Official 2026</div>
        SRILANKA NO.1 LINK SHARE PLATFORM | Powered by AKIYA Community Official
    </footer>

    <script>
        // 🔒 CONFIG & FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth(), ADMIN_EMAIL = "kaviakiya@gmail.com";

        let userData = { tokens: 100, isBlocked: false };

        // ⌨️ TYPING ANIMATION
        const slogan = "SRILANKA NO.1 LINK SHARE PLATFORM";
        let i = 0;
        function typeSlogan() {
            if (i < slogan.length) {
                document.getElementById("slogan-text").innerHTML += slogan.charAt(i);
                i++; setTimeout(typeSlogan, 100);
            }
        }
        typeSlogan();

        // 🛡️ AUTHENTICATION
        document.getElementById('google-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                setupUser(user);
            } else if (localStorage.getItem('pro_session')) {
                setupUser({ displayName: localStorage.getItem('pro_session'), email: "PRO", photoURL: "dragon.png" });
            }
        });

        function setupUser(user) {
            const userId = user.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + userId).on('value', snap => {
                let data = snap.val();
                if (!data) {
                    data = { name: user.displayName, email: user.email, tokens: 100, blocked: false, device: navigator.userAgent };
                    db.ref('users/' + userId).set(data);
                }
                if(data.blocked) document.getElementById('block-screen').style.display = 'flex';
                
                document.getElementById('user-tokens').innerText = data.tokens;
                document.getElementById('nav-pfp').src = user.photoURL || 'dragon.png';
                document.getElementById('prof-img').src = user.photoURL || 'dragon.png';
                document.getElementById('prof-name').innerText = user.displayName;
                
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('home').classList.add('active');
                document.getElementById('main-nav').style.display = 'flex';
                renderLinks();
            });
        }

        // 🃏 RENDER ADVANCED LINKS
        function renderLinks() {
            db.ref('links').on('value', s => {
                const grid = document.getElementById('home-grid');
                grid.innerHTML = "";
                const data = s.val();
                if(!data) return;
                Object.keys(data).reverse().forEach(id => {
                    let l = data[id];
                    grid.innerHTML += `
                        <div class="link-card">
                            <img src="dragon.png" class="card-dragon-icon">
                            <img src="${l.img || 'dragon.png'}">
                            <h3 style="color:red; margin:10px 0;">${l.title}</h3>
                            <p style="font-size:12px; color:#aaa;">${l.desc || 'Premium Link'}</p>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="color:gold;"><i class="fas fa-coins"></i> 20</span>
                                <button class="glow-btn" style="padding:5px 15px;" onclick="deductAndJoin('${l.url}')">JOIN NOW</button>
                            </div>
                        </div>`;
                });
            });
        }

        // 💰 TOKEN DEDUCTION
        function deductAndJoin(url) {
            const user = auth.currentUser;
            const userId = user.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + userId).once('value', snap => {
                let tokens = snap.val().tokens;
                if(tokens >= 20) {
                    db.ref('users/' + userId + '/tokens').set(tokens - 20);
                    window.open(url);
                } else {
                    alert("TOKENS මදි! කරුණාකර තව එකතු කරගන්න. 🐲");
                }
            });
        }

        // ✉️ MESSAGE ADMIN
        function sendMessage() {
            const msg = document.getElementById('admin-msg').value;
            if(msg) {
                db.ref('admin_messages').push({ user: auth.currentUser.email, message: msg, time: Date.now() });
                alert("Message Sent To Akiya! 🔥");
                document.getElementById('admin-msg').value = "";
            }
        }

        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
        }

        function logout() { auth.signOut(); localStorage.removeItem('pro_session'); location.reload(); }

        // 🔥 FIRE ANIMATION
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArr = [];
        window.onmousemove = (e) => { for(let i=0; i<3; i++) pArr.push({x:e.clientX, y:e.clientY, s:Math.random()*3, a:1}); };
        function drawFire() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pArr.forEach((p, i) => {
                p.y -= 2; p.a -= 0.015;
                ctx.fillStyle = `rgba(255, ${Math.random()*100}, 0, ${p.a})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
                if(p.a <= 0) pArr.splice(i, 1);
            });
            requestAnimationFrame(drawFire);
        }
        drawFire();
    </script>
</body>
</html>
