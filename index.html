<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | THE ULTIMATE REALM</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff0000; --dark-red: #8b0000; --gold: #ffd700; --black: #050505; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { margin: 0; background: var(--black); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* 🌌 BACKGROUND EFFECTS */
        #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; }
        .spider-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: url('https://www.transparenttextures.com/patterns/spider-web.png'); 
            opacity: 0.15; z-index:-1; pointer-events: none; 
        }

        /* 🧭 NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(10px); display: flex; justify-content: space-between; 
            align-items: center; padding: 10px 20px; z-index: 1000; border-bottom: 2px solid var(--red);
            box-shadow: 0 0 15px rgba(255,0,0,0.4);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .akiya-logo-nav { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--red); object-fit: cover; box-shadow: 0 0 10px var(--red); }

        .container { max-width: 1200px; margin: 90px auto 20px; padding: 0 15px; min-height: 80vh; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 💎 UI ELEMENTS */
        .btn-dragon { 
            background: linear-gradient(to right, var(--dark-red), var(--red));
            border: none; color: white; padding: 10px 22px; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase;
        }
        .btn-dragon:hover { letter-spacing: 2px; box-shadow: 0 0 20px var(--red); transform: scale(1.05); }
        .input-dragon { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; outline: none; }
        .input-dragon:focus { border-color: var(--red); }

        /* 🏠 FEED CARDS */
        .dragon-card { background: #0d0d0d; border-radius: 15px; border: 1px solid #222; overflow: hidden; position: relative; transition: 0.4s; }
        .dragon-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--red); }

        /* 🕷️ ABOUT & ADMIN */
        .about-card { background: linear-gradient(145deg, #1a0000, #050505); border: 2px solid var(--red); border-radius: 25px; padding: 40px; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .founder-dp { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--red); margin-bottom: 20px; box-shadow: 0 0 25px var(--red); object-fit: cover; }

        /* 📜 FOOTER */
        footer { margin-top: 50px; padding: 30px; text-align: center; border-top: 1px solid rgba(255,0,0,0.2); background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="spider-overlay"></div>

    <nav>
        <div class="nav-brand" onclick="showPage('home')">
            <img src="" id="akiya-main-logo" class="akiya-logo-nav" onerror="this.src='https://via.placeholder.com/150/ff0000/ffffff?text=A'">
            <span style="font-family:'Orbitron'; color:var(--red); font-weight:900; letter-spacing:1px;">AKIYA 龍</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="adm-btn" style="display:none; color:var(--gold); cursor:pointer;" onclick="showPage('admin')"><i class="fas fa-crown"></i></div>
            <div style="color:#00ff00; font-size:12px; font-weight:bold;"><span id="live-count">0</span> LIVE</div>
            <div style="color:var(--gold); font-weight:bold;"><i class="fas fa-coins"></i> <span id="u-tokens">0</span></div>
            <img id="nav-pfp" onclick="showPage('profile')" style="width:35px; height:35px; border-radius:50%; border:1px solid white; cursor:pointer; object-fit:cover;">
        </div>
    </nav>

    <div class="container">
        <div id="home" class="section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="font-family:'Orbitron';">REALM <span style="color:var(--red)">FEED</span></h2>
                <button class="btn-dragon" onclick="showPage('add')">PUBLISH +</button>
            </div>
            <div class="link-grid" id="feed" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px;"></div>
        </div>

        <div id="add" class="section">
            <button class="btn-dragon" style="background:#222; margin-bottom:20px;" onclick="showPage('home')"><i class="fas fa-times"></i> CLOSE</button>
            <div style="max-width:500px; margin:auto; background:#0a0a0a; padding:30px; border-radius:20px; border:1px solid var(--red);">
                <h3 style="font-family:'Orbitron'; color:var(--red); text-align:center;">NEW DISCOVERY</h3>
                <input type="text" id="l-title" class="input-dragon" placeholder="Link Title">
                <input type="text" id="l-url" class="input-dragon" placeholder="URL (https://...)">
                <textarea id="l-desc" class="input-dragon" style="height:80px" placeholder="Short Description"></textarea>
                <input type="file" id="l-file" class="input-dragon" accept="image/*">
                <button class="btn-dragon" style="width:100%" id="pub-btn" onclick="uploadLink()">IGNITE PUBLISH</button>
            </div>
        </div>

        <div id="profile" class="section">
            <button class="btn-dragon" style="background:#222; margin-bottom:20px;" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div style="max-width:500px; margin:auto; text-align:center; background:#0a0a0a; padding:40px; border-radius:25px;">
                <img id="p-img" class="founder-dp">
                <h2 id="p-name" style="font-family:'Orbitron'; margin-bottom:20px;">USER</h2>
                <input type="text" id="in-name" class="input-dragon" placeholder="Display Name">
                <input type="text" id="in-edu" class="input-dragon" placeholder="Education">
                <input type="text" id="in-loc" class="input-dragon" placeholder="Location">
                <button class="btn-dragon" style="width:100%" onclick="saveProfile()">SAVE CHANGES</button>
                <button class="btn-dragon" style="width:100%; margin-top:10px; background:#333;" onclick="showPage('about')">VIEW FOUNDER</button>
                <p onclick="auth.signOut()" style="color:var(--red); cursor:pointer; margin-top:25px; font-size:14px;">Logout from Realm</p>
            </div>
        </div>

        <div id="about" class="section">
            <button class="btn-dragon" style="background:#222; margin-bottom:20px;" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="about-card">
                <img id="ab-img" class="founder-dp">
                <h1 id="ab-name" style="font-family:'Orbitron'; color:var(--red); font-size:32px;">AKIYA</h1>
                <p style="color:var(--gold); letter-spacing:3px; font-size:12px; margin-bottom:20px;">LEGENDARY FOUNDER</p>
                <div style="text-align:left; max-width:350px; margin:20px auto; border-left:3px solid var(--red); padding-left:20px; line-height:2;">
                    <p><b>Edu:</b> <span id="ab-edu">--</span></p>
                    <p><b>Location:</b> <span id="ab-loc">--</span></p>
                </div>
            </div>
        </div>

        <div id="admin" class="section">
            <button class="btn-dragon" style="background:#222; margin-bottom:20px;" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="about-card">
                <h2 style="font-family:'Orbitron'; color:var(--gold);">MASTER CONTROL</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                    <div style="background:#000; padding:20px; border-radius:15px;">
                        <h1 id="tot-u" style="margin:0; color:var(--red);">0</h1>
                        <p style="font-size:12px;">TOTAL USERS</p>
                    </div>
                    <div style="background:#000; padding:20px; border-radius:15px;">
                        <h1 id="live-u" style="margin:0; color:#00ff00;">0</h1>
                        <p style="font-size:12px;">LIVE NOW</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p style="font-family:'Orbitron'; font-size:13px; letter-spacing:2px; color:var(--gold); margin:0;">
            POWERED BY <span style="color:var(--red); font-weight:900;">AKIYA</span>
        </p>
        <p style="font-size:10px; color:gray; margin-top:8px;">ALL RIGHTS RESERVED © 2026</p>
    </footer>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();
        let currentU = null, isFirstLoad = true;

        auth.onAuthStateChanged(user => {
            if(user) {
                const uid = user.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).on('value', snap => {
                    const data = snap.val();
                    if(!data && isFirstLoad) {
                        currentU = { name: user.displayName, pfp: user.photoURL, tokens: 100, email: user.email };
                        db.ref('users/' + uid).set(currentU);
                        isFirstLoad = false;
                    } else { currentU = data; }
                    
                    if(user.email === "kaviakiya@gmail.com") {
                        document.getElementById('adm-btn').style.display='block';
                        currentU.tokens = "∞";
                    }
                    updateUI();
                });
                db.ref('presence/' + uid).set(true);
                db.ref('presence/' + uid).onDisconnect().remove();
            } else { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        });

        function updateUI() {
            if(!currentU) return;
            document.getElementById('nav-pfp').src = currentU.pfp;
            document.getElementById('p-img').src = currentU.pfp;
            document.getElementById('u-tokens').innerText = currentU.tokens;
            document.getElementById('p-name').innerText = currentU.name;
            
            // Auto-sync Founder Info for everyone
            db.ref('users/kaviakiya@gmail_com').once('value', s => {
                const d = s.val();
                if(d) {
                    document.getElementById('akiya-main-logo').src = d.pfp;
                    document.getElementById('ab-img').src = d.pfp;
                    document.getElementById('ab-name').innerText = d.name;
                    document.getElementById('ab-edu').innerText = d.edu || "Dragon Master";
                    document.getElementById('ab-loc').innerText = d.loc || "Sri Lanka";
                }
            });
            loadLinks(); loadStats();
        }

        function saveProfile() {
            const uid = currentU.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + uid).update({
                name: document.getElementById('in-name').value || currentU.name,
                edu: document.getElementById('in-edu').value || "",
                loc: document.getElementById('in-loc').value || ""
            }).then(() => alert("Akiya Realm Updated! 🔥"));
        }

        function uploadLink() {
            const title = document.getElementById('l-title').value, url = document.getElementById('l-url').value, file = document.getElementById('l-file').files[0];
            if(!title || !url || !file) return alert("Fill all info!");
            if(currentU.tokens !== "∞" && currentU.tokens < 20) return alert("Low Tokens!");

            document.getElementById('pub-btn').innerText = "UPLOADING...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                db.ref('links').push({ title, url, img: reader.result, owner: currentU.name, owner_pfp: currentU.pfp }).then(() => {
                    if(currentU.tokens !== "∞") {
                        const uid = currentU.email.replace(/[.#$[\]]/g, "_");
                        db.ref('users/' + uid).update({tokens: currentU.tokens - 20});
                    }
                    document.getElementById('pub-btn').innerText = "IGNITE PUBLISH";
                    showPage('home'); alert("Dragon Link Published! 🐉");
                });
            };
        }

        function loadLinks() {
            db.ref('links').on('value', snap => {
                const feed = document.getElementById('feed'); feed.innerHTML = "";
                snap.forEach(c => {
                    const l = c.val();
                    feed.innerHTML += `<div class="dragon-card"><img src="${l.img}" class="card-img"><div style="padding:15px;"><h4 style="margin:0;color:var(--red);font-family:Orbitron;">${l.title}</h4><div style="display:flex;align-items:center;gap:5px;margin-top:5px;"><img src="${l.owner_pfp}" style="width:18px;height:18px;border-radius:50%;"><span style="font-size:10px;color:gray;">${l.owner}</span></div><a href="${l.url}" target="_blank" class="btn-dragon" style="display:block;text-align:center;text-decoration:none;margin-top:12px;font-size:11px;padding:8px;">ENTER</a></div></div>`;
                });
            });
        }

        function loadStats() {
            db.ref('presence').on('value', s => {
                document.getElementById('live-count').innerText = s.numChildren();
                document.getElementById('live-u').innerText = s.numChildren();
            });
            db.ref('users').on('value', s => document.getElementById('tot-u').innerText = s.numChildren());
        }

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 🌌 MAGIC PARTICLES ANIMATION
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pts = [];
        for(let i=0; i<60; i++) pts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, vy:Math.random()*0.5+0.2});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,0,0,0.4)";
            pts.forEach(p => { 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); 
                p.y -= p.vy; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
