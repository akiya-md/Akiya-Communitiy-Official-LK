
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026 v2.9 PRO ONLINE</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff1100; --black: #000000; --dark: #0a0a0a; --gold: #ffd700; --glass: rgba(15, 15, 15, 0.85); }
        * { box-sizing: border-box; cursor: none; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.6; }
        #cursor-fire { position: fixed; width: 12px; height: 12px; background: var(--red); border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 15px var(--red); }

        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 1000; border-bottom: 2px solid var(--red); }
        .nav-logo-container { display: flex; align-items: center; gap: 10px; }
        .pc-logo { width: 30px; filter: drop-shadow(0 0 5px var(--red)); }
        .nav-logo { color: var(--red); font-weight: bold; font-size: 18px; text-shadow: 0 0 10px var(--red); letter-spacing: 1px; }
        .nav-links a { color: white; text-decoration: none; margin: 0 8px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .nav-links a:hover { color: var(--red); }

        .section { display: none; padding: 90px 15px 60px; min-height: 100vh; }
        .active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ADMIN & LOGIN MODAL --- */
        #admin-panel { background: var(--dark); border: 2px solid var(--red); padding: 20px; border-radius: 20px; max-width: 500px; margin: 20px auto; display: none; box-shadow: 0 0 25px rgba(255,0,0,0.5); }
        .admin-input { width: 100%; padding: 10px; background: #151515; border: 1px solid #333; color: white; margin-bottom: 10px; border-radius: 8px; outline: none; font-size: 13px; }
        
        .pro-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--red); padding: 30px; border-radius: 20px; z-index: 3000; display: none; width: 90%; max-width: 350px; text-align: center; }

        /* --- LINK CARDS WITH BLUR --- */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; max-width: 1200px; margin: 20px auto; }
        @media (min-width: 768px) { .link-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; } }
        
        .link-card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 15px; text-align: center; transition: 0.3s; position: relative; }
        .link-card.locked { filter: blur(8px); pointer-events: none; opacity: 0.5; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        
        .card-dp { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; margin-bottom: 10px; border: 1px solid #333; }
        .del-btn { position: absolute; top: 5px; left: 5px; color: #ff1100; cursor: pointer; display: none; z-index: 20; }

        .glow-btn { padding: 10px 18px; background: transparent; border: 2px solid var(--red); color: var(--red); font-weight: bold; border-radius: 50px; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }

        footer { text-align: center; padding: 40px; border-top: 1px solid #111; color: #444; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="cursor-fire"></div>
    <canvas id="fire-canvas"></canvas>

    <nav>
        <div class="nav-logo-container">
            <img src="dragon.png" class="pc-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1040/1040232.png'">
            <div class="nav-logo">𝐀𝐊𝐈𝐘𝐀 龍</div>
        </div>
        <div class="nav-links" id="main-nav-links">
            <a onclick="showPage('home')">HOME</a>
            <a onclick="showPage('about')">ABOUT</a>
            <a onclick="toggleProModal()" id="nav-pro-btn" style="color:var(--gold)">PRO LOGIN</a>
        </div>
        <div id="auth-area">
            <div id="g_id_onload" data-client_id="180586817754-crv0p90dvrml6ojlgo9a6uvqccbjdn44.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard" data-size="small"></div>
        </div>
        <div id="user-profile" style="display:none; align-items:center; gap:8px;">
            <img id="user-pfp" style="width:28px; border-radius:50%; border: 2px solid var(--red);">
            <div style="display:flex; flex-direction:column;">
                <span id="user-name-disp" style="font-size:10px; font-weight:bold; color:var(--gold);">USER</span>
                <span onclick="logout()" style="color:#ff1100; cursor:pointer; font-size:8px; font-weight:bold;">LOGOUT</span>
            </div>
        </div>
    </nav>

    <div id="pro-modal" class="pro-modal">
        <h3 style="color:var(--red); margin-top:0;">PRO SUBSCRIBE LOGIN</h3>
        <input type="text" id="pro-user" class="admin-input" placeholder="Username">
        <input type="password" id="pro-pass" class="admin-input" placeholder="Password">
        <button class="glow-btn" style="width:100%; margin-bottom:10px;" onclick="proLogin()">LOGIN AS PRO</button>
        <button onclick="toggleProModal()" style="background:none; border:none; color:#666; cursor:pointer; font-size:10px;">CANCEL</button>
    </div>

    <div id="home" class="section active">
        <div style="text-align: center;">
            <img src="dragon.png" style="width: 100px; filter: drop-shadow(0 0 20px red);">
            <h1 style="color: var(--red); font-size: 2rem; margin: 0;">ආයුබෝවන්</h1>
            <p style="color: #666; letter-spacing: 2px; font-size: 10px;">OFFICIAL 2026 ONLINE PRO EDITION</p>

            <div id="admin-panel">
                <h3 style="color: var(--gold); margin-top: 0; font-size: 14px;">🐲 MASTER ADMIN PANEL</h3>
                <input type="text" id="t" class="admin-input" placeholder="Group Name">
                <input type="text" id="d" class="admin-input" placeholder="Small Info">
                <input type="text" id="u" class="admin-input" placeholder="Link URL">
                <select id="c" class="admin-input">
                    <option value="WHATSAPP">WHATSAPP</option>
                    <option value="TELEGRAM">TELEGRAM</option>
                </select>
                <input type="file" id="l-img" accept="image/*" class="admin-input">
                <button class="glow-btn" style="width: 100%; background:var(--red); color:white;" onclick="saveLink()">PUBLISH NOW</button>
            </div>

            <div id="guest-msg" style="margin-top:20px;">
                <p style="color:#777; font-size:11px;">You are browsing as a Guest. Links are locked.</p>
                <button class="glow-btn" onclick="toggleProModal()">SUBSCRIBE / LOGIN</button>
            </div>

            <h2 style="color:var(--gold); font-size: 16px; margin-top: 40px; border-bottom: 1px solid #222; padding-bottom: 10px;">LATEST UPDATES</h2>
            <div class="link-grid" id="home-grid"></div>
        </div>
    </div>

    <div id="about" class="section">
        <div style="max-width:500px; margin:auto; text-align:center; background:#0a0a0a; padding:30px; border-radius:20px; border:1px solid #222;">
            <img id="about-img-display" src="dragon.png" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--red);">
            <h2 id="disp-name" style="color:var(--red);">AKIYA</h2>
            <p id="disp-info" style="font-size:12px; color:#999;">Developer of Akiya Dragon Community.</p>
            <button class="glow-btn" onclick="window.location.href='https://wa.me/94755751816'">CONTACT</button>
        </div>
    </div>

    <footer>
        <p>POWERED BY AKIYA X DRAGON 2026</p>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_EMAIL = "kaviakiya@gmail.com";

        // Login Logic
        function handleCredentialResponse(r) {
            const payload = JSON.parse(atob(r.credential.split('.')[1]));
            localStorage.setItem('akiya_user', JSON.stringify({
                email: payload.email,
                name: payload.name,
                img: payload.picture,
                type: 'google'
            }));
            location.reload();
        }

        function proLogin() {
            const user = document.getElementById('pro-user').value;
            const pass = document.getElementById('pro-pass').value;
            // මෙතන Pro Username/Password එක උඹට ඕන එකක් දාගනින්
            if(user === "admin" && pass === "akiya2026") {
                localStorage.setItem('akiya_user', JSON.stringify({
                    email: 'pro@akiya.com',
                    name: 'PRO MEMBER',
                    img: 'dragon.png',
                    type: 'pro'
                }));
                location.reload();
            } else {
                alert("Invalid Pro Credentials!");
            }
        }

        window.onload = () => {
            const userData = JSON.parse(localStorage.getItem('akiya_user'));
            if(userData) {
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('nav-pro-btn').style.display = 'none';
                document.getElementById('guest-msg').style.display = 'none';
                document.getElementById('user-profile').style.display = 'flex';
                document.getElementById('user-pfp').src = userData.img;
                document.getElementById('user-name-disp').innerText = userData.name;

                if(userData.email === ADMIN_EMAIL) {
                    document.getElementById('admin-panel').style.display = 'block';
                }
            }
            renderLinks();
        };

        function renderLinks() {
            const isLogged = localStorage.getItem('akiya_user') !== null;
            db.ref('links').on('value', (s) => {
                const data = s.val();
                const hGrid = document.getElementById('home-grid');
                hGrid.innerHTML = "";
                for (let id in data) {
                    let l = data[id];
                    let cardHTML = `
                        <div class="link-card ${!isLogged ? 'locked' : ''}">
                            ${!isLogged ? '<div class="lock-overlay" onclick="toggleProModal()"><i class="fas fa-lock"></i></div>' : ''}
                            <img src="${l.img}" class="card-dp">
                            <h3>${l.title}</h3>
                            <button class="glow-btn" onclick="window.open('${l.url}')">JOIN</button>
                        </div>`;
                    hGrid.innerHTML += cardHTML;
                }
            });
        }

        function saveLink() {
            const title = document.getElementById('t').value, desc = document.getElementById('d').value,
                  url = document.getElementById('u').value, cat = document.getElementById('c').value,
                  file = document.getElementById('l-img').files[0];
            const r = new FileReader();
            r.onloadend = () => db.ref('links').push({ title, desc, url, cat, img: r.result || 'dragon.png' }).then(() => location.reload());
            if(file) r.readAsDataURL(file); else r.onloadend();
        }

        function toggleProModal() {
            const m = document.getElementById('pro-modal');
            m.style.display = (m.style.display === 'block' ? 'none' : 'block');
        }

        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
        }

        function logout() { localStorage.removeItem('akiya_user'); location.reload(); }

        // Fire Effect
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = [];
        window.onmousemove = (e) => {
            document.getElementById('cursor-fire').style.left = e.clientX+'px';
            document.getElementById('cursor-fire').style.top = e.clientY+'px';
            for(let i=0; i<2; i++) p.push({x: e.clientX, y: e.clientY, s: Math.random()*2+1, vy: -Math.random()*2, a: 1});
        };
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            p.forEach((m, i) => { m.y += m.vy; m.a -= 0.02; ctx.fillStyle = `rgba(255, 50, 0, ${m.a})`; ctx.beginPath(); ctx.arc(m.x, m.y, m.s, 0, Math.PI*2); ctx.fill(); if(m.a <= 0) p.splice(i, 1); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
