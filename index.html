<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026</title>
    <style>
        /* BASE & THEME */
        :root { --red: #ff0000; --gold: #ffd700; --black: #000000; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* FIREBALL BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }

        /* HEADER & NAVIGATION */
        header { padding: 20px; text-align: center; }
        #sticky-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; z-index: 1000; border-bottom: 1px solid var(--red); box-sizing: border-box; }
        .nav-logo { font-size: 20px; font-weight: bold; color: var(--red); text-shadow: 0 0 10px var(--red); }

        /* BUTTONS */
        .btn { cursor: pointer; border: 2px solid var(--red); background: transparent; color: var(--red); padding: 10px 20px; font-weight: bold; transition: 0.3s; box-shadow: 0 0 10px var(--red); border-radius: 5px; text-transform: uppercase; }
        .btn:hover { background: var(--red); color: white; box-shadow: 0 0 25px var(--red); }
        .btn-gold { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 15px var(--gold); animation: goldGlow 2s infinite; }
        @keyframes goldGlow { 0%, 100% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 30px var(--gold); } }

        /* MAIN UI */
        .main-logo-container { margin-top: 100px; text-align: center; }
        .main-logo { width: 250px; filter: drop-shadow(0 0 15px var(--red)); }
        #welcome-msg { font-size: 2.5rem; color: var(--red); text-shadow: 0 0 20px var(--red); margin: 20px 0; }
        
        /* CONTENT LOCKING */
        #content-section { filter: blur(15px); transition: 0.5s; padding: 50px; text-align: center; pointer-events: none; }
        .locked-msg { color: var(--red); font-weight: bold; font-size: 1.2rem; }

        /* LOGIN MODAL */
        #login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: #111; border: 2px solid var(--red); padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 0 40px var(--red); }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid var(--red); color: white; border-radius: 5px; }

        /* PRO RULES SECTION */
        #pro-rules { display: none; background: #111; border: 2px solid var(--gold); padding: 20px; margin: 20px auto; width: 80%; border-radius: 10px; }

        /* FOOTER */
        footer { border-top: 1px solid #333; padding: 50px 20px; text-align: center; background: #050505; }
        .footer-rights { color: var(--red); font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 5px var(--red); }
        .powered-by { color: white; font-weight: bold; margin-top: 10px; }

        /* FIRE TRAIL CANVAS */
        #trail-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="trail-canvas"></canvas>

    <div id="sticky-nav">
        <div class="nav-logo">𝐀𝐊𝐈𝐘𝐀 龍</div>
        <button class="btn btn-gold" onclick="toggleRules()">PRO SUBSCRIBE</button>
        <button class="btn" onclick="openLogin()">LOGIN</button>
    </div>

    <div class="main-logo-container">
        <img src="YOUR_LOGO_URL" alt="AKIYA DRAGON" class="main-logo">
        <div id="welcome-msg">ආයුබෝවන්</div>
    </div>

    <div id="pro-rules">
        <h2 style="color:var(--gold)">PRO SUBSCRIPTION RULES</h2>
        <p>• මෙම සේවාව වලංගු වන්නේ මාස 3කට පමණි.</p>
        <p>• එක ගිණුමකින් උපරිම සාමාජිකයින් 100ක් ඇතුලත් කළ හැක.</p>
        <p style="font-size: 24px; font-weight: bold; color: white;">PRICE: LKR 2,250</p>
        <button class="btn btn-gold" onclick="window.location.href='https://wa.me/YOUR_NUMBER?text=PRO%20USER%20IN%20SUBSCRIBE%20IN%20TO%20ME'">BUY NOW (WHATSAPP)</button>
    </div>

    <div id="content-section">
        <p class="locked-msg">PLEASE LOGIN TO ACCESS PREMIUM LINKS</p>
        <div style="height: 500px;"></div> </div>

    <footer>
        <button class="btn" style="margin-bottom: 30px;" onclick="openLogin()">LOGIN TO VIEW LINKS</button>
        <div class="footer-rights">© 2026 ALL RIGHTS RESERVED</div>
        <div class="powered-by">POWERED BY <span style="color: var(--red);">𝐀𝐊𝐈𝐘𝐀 龍 x DRAGON</span></div>
    </footer>

    <div id="login-modal">
        <div class="modal-box">
            <h3 style="color:var(--red)">SELECT LOGIN TYPE</h3>
            <button class="btn" style="width:100%; margin-bottom:15px;" onclick="alert('Google Login Redirect...')">GOOGLE LOGIN</button>
            <hr style="border:0.5px solid #333">
            <h4 style="color:var(--gold)">PRO LOGIN</h4>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-gold" style="width:100%" onclick="checkLogin()">LOGIN AS PRO</button>
            <button onclick="closeLogin()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        // 1. PRO USERS LIST (100 USERS)
        const proUsers = {
            "AKIYA_PRO_01": "AK@9471", "AKIYA_PRO_02": "AK@8823", "AKIYA_PRO_50": "AK@8802", "AKIYA_PRO_100": "AK@5512"
            // මචං මම මෙතන සාම්පල් 4ක් දැම්මා, අර 100ම මේ විදිහටම ඇතුලත් කරන්න.
        };

        // 2. FIREBALL BACKGROUND
        const bgCanvas = document.getElementById('bg-canvas');
        const ctx = bgCanvas.getContext('2d');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        let particles = [];
        class Fireball {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = bgCanvas.height + 100;
                this.size = Math.random() * 15 + 5;
                this.speedY = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() { this.y -= this.speedY; if (this.y < -50) this.y = bgCanvas.height + 100; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 0, 0, ${this.opacity})`;
                ctx.fill();
            }
        }
        for(let i=0; i<50; i++) particles.push(new Fireball());
        function animateBg() { ctx.clearRect(0,0,bgCanvas.width, bgCanvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateBg); }
        animateBg();

        // 3. MOUSE FIRE TRAIL & CLICK SPARKS
        const trailCanvas = document.getElementById('trail-canvas');
        const tCtx = trailCanvas.getContext('2d');
        trailCanvas.width = window.innerWidth; trailCanvas.height = window.innerHeight;
        let trail = [];
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<5; i++) trail.push({x: e.clientX, y: e.clientY, s: Math.random()*5+2, a: 1});
        });
        window.addEventListener('click', (e) => {
            for(let i=0; i<20; i++) trail.push({x: e.clientX, y: e.clientY, s: Math.random()*8+3, a: 1, vx: Math.random()*4-2, vy: Math.random()*4-2});
        });
        function animateTrail() {
            tCtx.clearRect(0,0,trailCanvas.width, trailCanvas.height);
            trail.forEach((p, i) => {
                p.a -= 0.02; if(p.vx) { p.x += p.vx; p.y += p.vy; }
                tCtx.fillStyle = `rgba(255, 69, 0, ${p.a})`;
                tCtx.beginPath(); tCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); tCtx.fill();
                if(p.a <= 0) trail.splice(i, 1);
            });
            requestAnimationFrame(animateTrail);
        }
        animateTrail();

        // 4. UI LOGIC
        function openLogin() { document.getElementById('login-modal').style.display = 'flex'; }
        function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }
        function toggleRules() { 
            let r = document.getElementById('pro-rules');
            r.style.display = (r.style.display === 'block') ? 'none' : 'block';
            window.scrollTo(0, r.offsetTop - 100);
        }

        function checkLogin() {
            let u = document.getElementById('user').value;
            let p = document.getElementById('pass').value;
            if (proUsers[u] && proUsers[u] === p) {
                alert("ACCESS GRANTED! Welcome Pro User.");
                document.getElementById('content-section').style.filter = "none";
                document.getElementById('content-section').style.pointerEvents = "auto";
                document.getElementById('welcome-msg').innerText = "සාදරයෙන් පිළිගන්නවා, " + u;
                closeLogin();
            } else { alert("INVALID CREDENTIALS!"); }
        }
    </script>
</body>
</html>
