<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026 PRO v2.0</title>
    
    <link rel="icon" type="image/png" href="dragon.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --red: #ff1100; --black: #000000; --gold: #ffd700; --glass: rgba(10, 10, 10, 0.95); --neon: 0 0 15px var(--red); }
        * { box-sizing: border-box; transition: 0.3s; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* 🔥 ANIMATIONS */
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .floating-dragon { width: 80px; position: fixed; bottom: 20px; left: 20px; z-index: 2000; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 0 10px red); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        /* 🧭 NAVIGATION */
        nav { position: fixed; top: 0; width: 100%; background: var(--glass); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 1000; border-bottom: 2px solid var(--red); box-shadow: var(--neon); }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-item { cursor: pointer; font-weight: bold; font-size: 12px; color: #ccc; }
        .nav-item:hover { color: var(--red); text-shadow: var(--neon); }

        .section { display: none; padding: 100px 20px 60px; min-height: 100vh; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🐲 UI ELEMENTS */
        .glow-btn { background: transparent; border: 2px solid var(--red); color: var(--red); padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: var(--neon); }
        .input-field { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        
        /* 📂 LINK CARDS */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .link-card { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; overflow: hidden; position: relative; }
        .link-card:hover { border-color: var(--red); transform: scale(1.02); }
        .card-img-wrap { position: relative; width: 100%; height: 160px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .square-dp { position: absolute; bottom: 10px; left: 10px; width: 50px; height: 50px; border: 2px solid var(--red); background: black; border-radius: 5px; object-fit: cover; }

        /* 💰 OVERLAYS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #050505; border: 2px solid var(--red); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; }
        .back-label { display: none; font-size: 10px; color: gold; text-align: center; margin-top: 5px; }

        /* 👑 BADGES */
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .badge-admin { background: gold; color: black; }
        .badge-premium { background: var(--red); color: white; }
    </style>
</head>
<body>

    <canvas id="fire-canvas"></canvas>
    <img src="dragon.png" class="floating-dragon">

    <nav id="main-nav" style="display:none;">
        <div style="color:red; font-weight:bold; cursor:pointer;" onclick="showPage('home')">AKIYA 龍</div>
        <div class="nav-links">
            <div id="online-pulse" style="font-size:10px; color:#00ff00;"><i class="fas fa-circle"></i> <span id="online-count">0</span> LIVE</div>
            <div class="glow-btn" style="padding: 5px 12px; font-size: 10px;" onclick="openAddLink()"><i class="fas fa-plus"></i> ADD LINK</div>
            <div onclick="openTokenShop()" style="color:gold; cursor:pointer; font-weight:bold;"><i class="fas fa-coins"></i> <span id="user-tokens">0</span></div>
            <img id="nav-pfp" onclick="showPage('profile')" style="width:30px; height:30px; border-radius:50%; border:1px solid red; cursor:pointer;">
        </div>
    </nav>

    <div id="login-screen" class="section active">
        <div style="max-width:350px; margin:auto; text-align:center; padding:40px; background:var(--glass); border-radius:20px; border:1px solid #222;">
            <img src="dragon.png" width="80">
            <h2 style="color:red; text-shadow: var(--neon);">DRAGON LOGIN</h2>
            
            <button class="glow-btn" style="width:100%; margin-bottom:20px; border-color:#4285F4; color:#4285F4;" onclick="googleLogin()">
                <i class="fab fa-google"></i> GOOGLE ACCESS
            </button>
            
            <div style="color:#555; margin-bottom:20px;">--- OR PREMIUM ---</div>
            
            <input type="text" id="pre-user" class="input-field" placeholder="Username">
            <input type="password" id="pre-pass" class="input-field" placeholder="Password">
            <button class="glow-btn" style="width:100%;" onclick="premiumLogin()">ACCESS REALM 🐉</button>
        </div>
    </div>

    <div id="home" class="section">
        <div class="link-grid" id="link-container"></div>
    </div>

    <div id="add-link-overlay" class="overlay">
        <div class="modal-content">
            <h3 style="color:red;">🐉 POST NEW LINK</h3>
            <p style="font-size:11px; color:gray;">Cost: 20 Dragon Tokens</p>
            <input type="text" id="link-title" class="input-field" placeholder="Title / Description">
            <input type="text" id="link-url" class="input-field" placeholder="URL (https://...)">
            <select id="link-cat" class="input-field">
                <option value="WhatsApp">WhatsApp Groups</option>
                <option value="Telegram">Telegram Channels</option>
                <option value="YouTube">YouTube Channels</option>
                <option value="Personal">Personal Profiles</option>
            </select>
            <label style="font-size:12px;">Cover Image (PC/Mobile):</label>
            <input type="file" id="link-file" class="input-field">
            <button class="glow-btn" style="width:100%;" onclick="processAddLink()">PUBLISH (20 Tokens)</button>
            <button class="glow-btn" style="width:100%; margin-top:10px; border-color:gray; color:gray;" onclick="closeOverlay('add-link-overlay')">CANCEL</button>
        </div>
    </div>

    <div id="token-overlay" class="overlay">
        <div class="modal-content">
            <h3 style="color:gold;">🐉 DRAGON TOKENS</h3>
            <div id="redeem-section" style="margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:20px;">
                <input type="text" id="redeem-input" class="input-field" placeholder="Enter Redeem Code">
                <button class="glow-btn" style="width:100%;" onclick="redeemToken()">CLAIM TOKENS</button>
            </div>
            <div class="price-card" style="background:#111; padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span>1200 Tokens</span> <b>LKR 1000</b> 
                <button class="glow-btn" onclick="buyWA(1200)">BUY</button>
            </div>
            <button class="glow-btn" style="width:100%; margin-top:10px; border-color:gray; color:gray;" onclick="closeOverlay('token-overlay')">CLOSE</button>
        </div>
    </div>

    <div id="profile" class="section">
        <div style="max-width:400px; margin:auto; text-align:center; background:var(--glass); padding:30px; border-radius:20px; border:1px solid #333;">
            <div style="position:relative; display:inline-block;">
                <img id="u-pfp" style="width:100px; height:100px; border-radius:50%; border:3px solid red;">
                <div id="profile-alert" style="display:none; position:absolute; top:0; right:0; color:yellow; font-size:20px;">⚠️</div>
            </div>
            <h3 id="u-display-name">USER</h3>
            <input type="text" id="u-name-in" class="input-field" placeholder="Full Name">
            <input type="text" id="u-wa-in" class="input-field" placeholder="WhatsApp Number">
            <select id="u-gen-in" class="input-field">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>
            <button class="glow-btn" style="width:100%;" onclick="updateProfile()">SAVE & UPDATE</button>
            <button class="glow-btn" style="width:100%; margin-top:10px; border-color:gray; color:gray;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div id="about" class="section">
        <div style="max-width:600px; margin:auto; text-align:center;">
            <div style="width:150px; height:150px; margin:auto; border-radius:50%; overflow:hidden; border:4px solid red; box-shadow: 0 0 30px red;">
                <img src="akiya.png" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h2 style="color:red; margin-top:20px;">AKIYA 龍</h2>
            <div style="background:rgba(255,0,0,0.1); padding:20px; border-radius:15px; border:1px solid var(--red); text-align:left;">
                <p><b>Education:</b> By Akiya</p>
                <p><b>Age:</b> 20+</p>
                <p><b>Location:</b> Sri Lanka 🇱🇰</p>
                <p><b>Purpose:</b> Building the most powerful dragon community in 2026.</p>
            </div>
            <button class="glow-btn" style="margin-top:20px;" onclick="showPage('home')">BACK TO HOME</button>
        </div>
    </div>

    <script>
        // 🛡️ DATABASE CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();
        let userData = null;

        // 🛡️ 60 CHAOTIC LOGINS (Sample of logic)
        const premiumUsers = { "qxZ91v": "pW28@Rm", "bN44mK": "xT92#Lk", "vR19pL": "jH37$Qp" /* ... add all 60 here */ };

        // 🛡️ AUTH OBSERVER (Sticky Session)
        auth.onAuthStateChanged(user => {
            if (user) {
                const uid = user.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).on('value', snap => {
                    userData = snap.val();
                    if(!userData) {
                        // First Login: Give 100 Tokens (Anti-cheat device check usually handled by IP/Fingerprint in real backend)
                        userData = { tokens: 100, name: user.displayName, pfp: user.photoURL, email: user.email, isNew: true };
                        db.ref('users/' + uid).set(userData);
                    }
                    updateUI();
                });
                // Live tracking
                db.ref('presence/' + uid).set({ name: user.displayName, status: 'online' });
                db.ref('presence/' + uid).onDisconnect().remove();
            } else { showPage('login-screen'); }
        });

        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function premiumLogin() {
            const u = document.getElementById('pre-user').value;
            const p = document.getElementById('pre-pass').value;
            if(premiumUsers[u] === p) {
                alert("Premium Access Granted! 👑");
                // Custom logic for premium session
                showPage('home');
            } else { alert("Invalid Credentials!"); }
        }

        function updateUI() {
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('user-tokens').innerText = userData.tokens;
            document.getElementById('nav-pfp').src = userData.pfp || 'dragon.png';
            document.getElementById('u-pfp').src = userData.pfp || 'dragon.png';
            document.getElementById('u-display-name').innerText = userData.name;
            
            // Profile Alert Logic
            if(!userData.phone) document.getElementById('profile-alert').style.display = 'block';
            else document.getElementById('profile-alert').style.display = 'none';

            showPage('home');
            renderLinks();
            updateVisitorCount();
        }

        // ➕ ADD LINK LOGIC
        function openAddLink() { document.getElementById('add-link-overlay').style.display = 'flex'; }
        
        function processAddLink() {
            if(userData.tokens < 20) { alert("Need 20 Tokens!"); return; }
            const title = document.getElementById('link-title').value;
            const url = document.getElementById('link-url').value;
            const cat = document.getElementById('link-cat').value;
            const file = document.getElementById('link-file').files[0];

            if(!title || !url || !file) { alert("Fill all fields!"); return; }

            const reader = new FileReader();
            reader.onloadend = () => {
                db.ref('links').push({ title, url, cat, img: reader.result, owner: userData.email });
                const newTokens = userData.tokens - 20;
                db.ref('users/' + userData.email.replace(/[.#$[\]]/g, "_")).update({ tokens: newTokens });
                closeOverlay('add-link-overlay');
                alert("Link Added! -20 Tokens 🐉");
            };
            reader.readAsDataURL(file);
        }

        function renderLinks() {
            db.ref('links').on('value', snap => {
                const container = document.getElementById('link-container');
                container.innerHTML = "";
                snap.forEach(child => {
                    const l = child.val();
                    container.innerHTML += `
                        <div class="link-card" onclick="handleCardClick(this)">
                            <div class="card-img-wrap">
                                <img src="${l.img}" class="card-img">
                                <img src="dragon.png" class="square-dp">
                            </div>
                            <div style="padding:12px;">
                                <div style="font-size:10px; color:gray;">${l.cat}</div>
                                <h4 style="margin:5px 0; color:red;">${l.title}</h4>
                                <a href="${l.url}" class="glow-btn" style="width:100%; padding:5px; font-size:11px;">JOIN NOW</a>
                                <div class="back-label">BACK</div>
                            </div>
                        </div>`;
                });
            });
        }

        // 💰 REDEEM SYSTEM
        const redeemCodes = { "qX91vR100": 100, "Z200mQ1": 200, "X300vP4": 300 }; // Use the 150 codes here

        function redeemToken() {
            const code = document.getElementById('redeem-input').value;
            if(redeemCodes[code]) {
                const amt = redeemCodes[code];
                const newTokens = userData.tokens + amt;
                db.ref('users/' + userData.email.replace(/[.#$[\]]/g, "_")).update({ tokens: newTokens });
                alert(`Claimed ${amt} Tokens! 💎`);
                delete redeemCodes[code]; // One-time use logic
            } else { alert("Invalid Code!"); }
        }

        // 🧭 UTILS
        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
        }

        function openTokenShop() { document.getElementById('token-overlay').style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

        function handleCardClick(card) {
            const label = card.querySelector('.back-label');
            label.style.display = 'block';
            setTimeout(() => label.style.display = 'none', 2000);
        }

        function updateVisitorCount() {
            db.ref('presence').on('value', s => {
                document.getElementById('online-count').innerText = s.numChildren();
            });
        }

        function updateProfile() {
            const name = document.getElementById('u-name-in').value;
            const phone = document.getElementById('u-wa-in').value;
            const gender = document.getElementById('u-gen-in').value;
            const uid = userData.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + uid).update({ name, phone, gender });
            
            // Secret EmailJS
            emailjs.send("service_h6bsq2s", "template_7slq3e6", {
                user_name: name, user_email: userData.email, user_phone: phone
            }, "aop4SIq1OjHZn_EW7");
            
            alert("Profile Updated! 🔥");
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // 🔥 FIRE PARTICLES
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pts = [];
        window.onmousemove = (e) => { for(let i=0; i<2; i++) pts.push({x:e.clientX, y:e.clientY, a:1, s:Math.random()*2}); };
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach((p, i) => {
                p.y -= 1; p.a -= 0.02;
                ctx.fillStyle = `rgba(255,17,0,${p.a})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
                if(p.a <= 0) pts.splice(i,1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
