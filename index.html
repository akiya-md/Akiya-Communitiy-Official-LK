
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --red: #ff1100; --black: #000000; --dark: #0a0a0a; --gold: #ffd700; }
        * { box-sizing: border-box; cursor: none; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- GINI BOLA BACKGROUND --- */
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        #cursor-fire { position: fixed; width: 15px; height: 15px; background: var(--red); border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 20px var(--red), 0 0 40px var(--red); }

        /* --- NAV --- */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; z-index: 1000; border-bottom: 2px solid var(--red); }
        .nav-logo { color: var(--red); font-weight: bold; font-size: 22px; text-shadow: 0 0 10px var(--red); }
        .nav-links a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; cursor: pointer; }
        .user-nav { display: flex; align-items: center; gap: 10px; }
        .user-img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--red); }

        /* --- SECTIONS --- */
        .section { display: none; padding: 120px 20px 60px; min-height: 100vh; }
        .active { display: block; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ADMIN MASTER PANEL --- */
        #admin-panel { background: rgba(15,15,15,0.95); border: 2px solid var(--red); padding: 25px; border-radius: 20px; max-width: 650px; margin: 30px auto; display: none; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .admin-input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; margin-bottom: 10px; border-radius: 8px; }

        /* --- LINK CARDS (WITH DP & DESC) --- */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .link-card { background: #0d0d0d; border: 1px solid #222; padding: 25px; border-radius: 25px; text-align: center; transition: 0.4s; position: relative; overflow: hidden; }
        .link-card:hover { border-color: var(--red); transform: translateY(-8px); box-shadow: 0 10px 25px rgba(255,0,0,0.2); }
        .link-dp { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--red); margin: 0 auto 15px; object-fit: cover; background: #222; }
        .link-desc { color: #aaa; font-size: 13px; line-height: 1.5; margin: 10px 0 20px; height: 40px; overflow: hidden; }
        .post-by { font-size: 11px; color: var(--gold); font-weight: bold; letter-spacing: 1px; }

        .btn { padding: 12px 28px; border: 2px solid var(--red); background: transparent; color: var(--red); font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }
        footer { text-align: center; padding: 50px; border-top: 1px solid #222; background: black; }
    </style>
</head>
<body>

    <div id="cursor-fire"></div>
    <canvas id="fire-canvas"></canvas>

    <nav>
        <div class="nav-logo">𝐀𝐊𝐈𝐘𝐀 龍</div>
        <div class="nav-links">
            <a onclick="showPage('home')">HOME</a>
            <a onclick="showPage('category')">CATEGORY</a>
            <a onclick="showPage('about')">ABOUT</a>
        </div>
        <div id="auth-area">
            <div id="g_id_onload" data-client_id="180586817754-crv0p90dvrml6ojlgo9a6uvqccbjdn44.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
        <div id="user-profile" class="user-nav" style="display: none;">
            <span id="user-name" style="font-size: 13px;"></span>
            <img id="user-pfp" class="user-img">
            <span style="color:#555; cursor:pointer; font-size:10px;" onclick="logout()">LOGOUT</span>
        </div>
    </nav>

    <div id="home" class="section active">
        <div style="text-align: center;">
            <img src="dragon.png" style="width: 160px; filter: drop-shadow(0 0 20px red);">
            <h1 id="welcome-msg" style="font-size: 3rem; color: var(--red); text-shadow: 0 0 15px red;">ආයුබෝවන්</h1>
            
            <div id="admin-panel">
                <h3 style="color: var(--gold);">🐲 MASTER ADMIN - ADD NEW GROUP</h3>
                <input type="text" id="t" class="admin-input" placeholder="Group Name (e.g. Movie Hub)">
                <input type="text" id="img" class="admin-input" placeholder="Image URL (DP එකේ ලින්ක් එක)">
                <input type="text" id="desc" class="admin-input" placeholder="Small Description (විස්තරය)">
                <input type="text" id="u" class="admin-input" placeholder="Group Link (https://...)">
                <select id="c" class="admin-input">
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Telegram">Telegram</option>
                    <option value="YouTube">YouTube</option>
                </select>
                <button class="btn" style="width: 100%;" onclick="saveLink()">UPLOAD TO DATABASE</button>
            </div>
        </div>
    </div>

    <div id="category" class="section">
        <h2 style="text-align: center; color: var(--red); letter-spacing: 3px;">PREMIUM GROUPS</h2>
        <div id="cat-locked" style="text-align:center; color: gray;">[ Please Login to Access Groups ]</div>
        <div id="cat-unlocked" style="display:none;">
            <div class="link-grid" id="grid"></div>
        </div>
    </div>

    <script>
        const ADMIN = "kaviakiya@gmail.com";
        let links = JSON.parse(localStorage.getItem('aki_links')) || [];

        // GOOGLE LOGIN
        function handleCredentialResponse(r) {
            const d = JSON.parse(atob(r.credential.split('.')[1]));
            localStorage.setItem('u_name', d.name);
            localStorage.setItem('u_img', d.picture);
            localStorage.setItem('u_email', d.email);
            localStorage.setItem('is_l', 'true');
            location.reload();
        }

        function updateUI() {
            if(localStorage.getItem('is_l')) {
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('user-profile').style.display = 'flex';
                document.getElementById('user-name').innerText = localStorage.getItem('u_name');
                document.getElementById('user-pfp').src = localStorage.getItem('u_img');
                document.getElementById('cat-locked').style.display = 'none';
                document.getElementById('cat-unlocked').style.display = 'block';
                if(localStorage.getItem('u_email') === ADMIN) document.getElementById('admin-panel').style.display = 'block';
            }
        }

        // SAVE LINK (WITH DP & DESC)
        function saveLink() {
            const title = document.getElementById('t').value;
            const dp = document.getElementById('img').value || 'https://via.placeholder.com/150/333/fff?text=龍';
            const dsc = document.getElementById('desc').value;
            const url = document.getElementById('u').value;
            const cat = document.getElementById('c').value;

            if(title && url) {
                links.push({title, dp, dsc, url, cat});
                localStorage.setItem('aki_links', JSON.stringify(links));
                alert("Group Added Successfully!"); location.reload();
            }
        }

        function renderGrid() {
            document.getElementById('grid').innerHTML = links.map((l, i) => `
                <div class="link-card">
                    <div style="font-size:9px; background:red; color:white; padding:3px 8px; border-radius:5px; position:absolute; top:15px; right:15px;">${l.cat}</div>
                    <img src="${l.dp}" class="link-dp">
                    <h3 style="margin:0; color:white;">${l.title}</h3>
                    <p class="link-desc">${l.dsc || 'No description available for this group.'}</p>
                    <button class="btn" style="width:100%;" onclick="window.open('${l.url}')">JOIN GROUP</button>
                    <div style="margin-top:15px;"><span class="post-by">POST BY AKINDU</span></div>
                    ${localStorage.getItem('u_email') === ADMIN ? `<small style="color:red; cursor:pointer;" onclick="del(${i})">Delete</small>` : ''}
                </div>
            `).join('');
        }

        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(p === 'category') renderGrid();
        }

        function del(i) { links.splice(i, 1); localStorage.setItem('aki_links', JSON.stringify(links)); renderGrid(); }
        function logout() { localStorage.clear(); location.reload(); }

        // --- GINI BOLA BACKGROUND ENGINE ---
        const canvas = document.getElementById('fire-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 8 + 2;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = `rgba(255, ${Math.random() * 100}, 0, 0.8)`;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 15; ctx.shadowColor = 'red';
            }
        }

        window.addEventListener('mousemove', (e) => {
            document.getElementById('cursor-fire').style.left = e.clientX + 'px';
            document.getElementById('cursor-fire').style.top = e.clientY + 'px';
            for (let i = 0; i < 5; i++) particles.push(new Particle(e.clientX, e.clientY));
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].size <= 0.2) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate(); window.onload = updateUI;
    </script>
</body>
</html>
