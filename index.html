<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026 v2.0 PRO</title>
    
    <link rel="icon" type="image/png" href="dragon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff1100; --black: #000000; --dark: #0a0a0a; --gold: #ffd700; --glass: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; cursor: none; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* FIRE BACKGROUND EFFECT */
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.7; }
        #cursor-fire { position: fixed; width: 12px; height: 12px; background: var(--red); border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 15px var(--red); }

        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 1000; border-bottom: 2px solid var(--red); }
        .nav-logo-container { display: flex; flex-direction: column; align-items: flex-start; }
        .nav-logo { color: var(--red); font-weight: bold; font-size: 18px; text-shadow: 0 0 10px var(--red); letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        #slogan-text { font-size: 9px; color: var(--gold); font-weight: bold; min-height: 12px; }

        .section { display: none; padding: 100px 15px 60px; min-height: 100vh; }
        .active { display: block; animation: fadeIn 0.6s ease-out; }

        /* DRAGON TOKEN & PROFILE UI */
        .token-badge { background: linear-gradient(45deg, #440000, #ff1100); padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; border: 1px solid var(--gold); color: white; display: flex; align-items: center; gap: 5px; }
        
        .link-grid { display: grid; grid-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .link-card { background: var(--glass); border: 1px solid #222; padding: 20px; border-radius: 20px; text-align: center; position: relative; transition: 0.4s; overflow: hidden; }
        .link-card:hover { border-color: var(--red); box-shadow: 0 0 20px rgba(255,17,0,0.2); }
        .card-locked-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }

        /* MODALS & PANELS */
        .full-page-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--black); z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        .block-screen { background: radial-gradient(circle, #220000, #000000); text-align: center; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; position: fixed; top:0; left:0; width:100%; height:100%; }

        .glow-btn { padding: 12px 24px; background: transparent; border: 2px solid var(--red); color: var(--red); font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 11px; transition: 0.3s; text-transform: uppercase; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: 0 0 20px var(--red); }
        
        /* COMMENT SYSTEM */
        .comment-section { margin-top: 30px; text-align: left; background: #080808; padding: 20px; border-radius: 15px; border: 1px solid #111; }
        .comment-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; outline: none; }
        .user-comment { display: flex; gap: 12px; margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 10px; animation: slideUp 0.4s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        .rules-box { font-size: 10px; color: #888; margin-top: 15px; padding: 10px; border-top: 1px solid #222; text-align: left; }
    </style>
</head>
<body>

    <div id="cursor-fire"></div>
    <canvas id="fire-canvas"></canvas>

    <div id="block-screen" class="block-screen">
        <img src="dragon.png" style="width: 120px; filter: grayscale(1) drop-shadow(0 0 20px red);">
        <h1 style="color: var(--red); font-size: 2.5rem;">YOU HAVE BEEN BLOCKED</h1>
        <p id="block-reason" style="color: var(--gold);"></p>
        <div id="block-timer" style="font-size: 20px; font-weight: bold; margin: 20px; color: white;"></div>
        <p style="font-size: 12px; color: #555;">සයිට් එකේ නීති රීති උල්ලංඝනය කිරීම නිසා ඔබව තාවකාලිකව තහනම් කර ඇත.</p>
    </div>

    <nav>
        <div class="nav-logo-container">
            <div class="nav-logo">
                <img src="dragon.png" style="width:25px;"> 
                <span>𝐀𝐊𝐈𝐘𝐀 龍</span>
            </div>
            <div id="slogan-text"></div>
        </div>
        <div class="nav-links">
            <a onclick="showPage('home')">HOME</a>
            <a onclick="showPage('about')">DEVELOPER</a>
            <a onclick="openShop()" style="color:var(--gold)"><i class="fas fa-coins"></i> SHOP</a>
        </div>
        <div id="auth-area">
            <div id="g_id_onload" data-client_id="180586817754-crv0p90dvrml6ojlgo9a6uvqccbjdn44.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard" data-size="small"></div>
        </div>
        <div id="user-profile-nav" style="display:none; align-items:center; gap:12px;">
            <div class="token-badge"><i class="fas fa-fire"></i> <span id="nav-tokens">0</span></div>
            <img id="nav-user-pfp" onclick="showPage('profile')" style="width:30px; height:30px; border-radius:50%; border:2px solid var(--red); cursor:pointer;">
        </div>
    </nav>

    <div id="home" class="section active">
        <div class="search-box" style="text-align:center; margin-bottom:30px;">
            <input type="text" id="searchInput" onkeyup="renderLinks()" placeholder="Search Links Here..." style="width:90%; max-width:600px; padding:15px; border-radius:50px; background:#0d0d0d; border:1px solid #222; color:white; outline:none;">
        </div>
        
        <div id="admin-panel" style="display:none; background:rgba(20,0,0,0.8); padding:20px; border-radius:20px; border:1px solid var(--red); max-width:600px; margin: 0 auto 30px;">
            <h3 style="color:var(--gold); text-align:center;">🐲 MASTER ADMIN</h3>
            <input type="text" id="link-t" class="admin-input" placeholder="Group Name" style="width:100%; margin-bottom:10px; background:#000; border:1px solid #333; color:white; padding:10px;">
            <input type="text" id="link-u" class="admin-input" placeholder="Join URL" style="width:100%; margin-bottom:10px; background:#000; border:1px solid #333; color:white; padding:10px;">
            <button class="glow-btn" onclick="addLink()" style="width:100%">PUBLISH LINK</button>
        </div>

        <div class="link-grid" id="home-grid"></div>
    </div>

    <div id="profile" class="section">
        <div style="max-width:500px; margin:auto; background:var(--glass); padding:30px; border-radius:25px; border:1px solid var(--red);">
            <h2 style="color:var(--red); text-align:center;">USER PROFILE</h2>
            <div style="text-align:center; margin-bottom:20px;">
                <img id="setup-pfp" src="dragon.png" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--red); object-fit:cover;">
                <input type="file" id="pfp-input" style="display:none" onchange="previewPFP(this)">
                <br><button class="glow-btn" style="margin-top:10px; font-size:8px;" onclick="document.getElementById('pfp-input').click()">CHANGE DP</button>
            </div>
            <input type="text" id="u-name" class="admin-input" placeholder="Full Name" style="width:100%; margin-bottom:10px; padding:12px; background:#111; border:1px solid #333; color:white;">
            <select id="u-gender" class="admin-input" style="width:100%; margin-bottom:10px; padding:12px; background:#111; border:1px solid #333; color:white;">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>
            <input type="text" id="u-address" class="admin-input" placeholder="Address" style="width:100%; margin-bottom:10px; padding:12px; background:#111; border:1px solid #333; color:white;">
            <input type="number" id="u-age" class="admin-input" placeholder="Age" style="width:100%; margin-bottom:10px; padding:12px; background:#111; border:1px solid #333; color:white;">
            <input type="text" id="u-whatsapp" class="admin-input" placeholder="WhatsApp Number" style="width:100%; margin-bottom:10px; padding:12px; background:#111; border:1px solid #333; color:white;">
            
            <button class="glow-btn" style="width:100%; background:var(--red); color:white;" onclick="saveUserProfile()">SAVE & UPDATE PROFILE</button>
            <hr style="border:1px solid #222; margin:20px 0;">
            <h4 style="color:var(--gold)">MESSAGE ADMIN</h4>
            <textarea id="admin-msg" placeholder="Type your message to Akiya..." style="width:100%; height:80px; background:#111; border:1px solid #333; color:white; padding:10px; border-radius:10px;"></textarea>
            <button class="glow-btn" style="width:100%; margin-top:10px;" onclick="sendMessageToAdmin()">SEND MESSAGE</button>
        </div>
    </div>

    <div id="shop-modal" class="full-page-modal">
        <h1 style="color:var(--red); text-align:center;">DRAGON TOKEN SHOP</h1>
        <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:30px;">
            <div class="link-card" style="width:250px;">
                <h2 style="color:var(--gold)">100 TOKENS</h2>
                <p>LKR 150</p>
                <button class="glow-btn" onclick="buyTokens(100, 150)">BUY VIA WHATSAPP</button>
            </div>
            <div class="link-card" style="width:250px;">
                <h2 style="color:var(--gold)">200 TOKENS</h2>
                <p>LKR 280</p>
                <button class="glow-btn" onclick="buyTokens(200, 280)">BUY VIA WHATSAPP</button>
            </div>
            <div class="link-card" style="width:250px;">
                <h2 style="color:var(--gold)">300 TOKENS</h2>
                <p>LKR 400</p>
                <button class="glow-btn" onclick="buyTokens(300, 400)">BUY VIA WHATSAPP</button>
            </div>
        </div>
        <div style="max-width:400px; margin:40px auto; text-align:center;">
            <h3 style="color:var(--red)">REDEEM CODE</h3>
            <input type="text" id="redeem-input" maxlength="8" placeholder="Enter 8-Digit Code" style="width:100%; padding:15px; text-align:center; background:#111; border:2px solid var(--gold); color:white; font-weight:bold; border-radius:10px;">
            <button class="glow-btn" style="margin-top:15px; width:100%;" onclick="redeemToken()">REDEEM NOW</button>
        </div>
        <div style="text-align:center;"><button class="glow-btn" onclick="closeShop()">CLOSE SHOP</button></div>
    </div>

    <div id="link-detail-view" class="full-page-modal">
        <div id="detail-content" style="max-width:700px; margin:auto;"></div>
        <div style="text-align:center; margin-top:40px;"><button class="glow-btn" onclick="closeDetail()">BACK TO HOME</button></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_EMAIL = "kaviakiya@gmail.com";

        // REDEEM CODES DATA (Stored in Code for Security)
        const REDEEM_DB = {
            "AK10-7R2": 100, "AK10-M5X": 100, "AK20-H7N": 200, "AK20-P4V": 200, "AK30-B9X": 300, "AK30-L5K": 300
            // ... all 150 codes would be mapped here
        };

        let userData = null;

        // 1. TYPING ANIMATION FOR SLOGAN
        const slogan = "SRILANKA NO.1 LINK SHARE PLATFORM";
        let sloganIdx = 0;
        function typeSlogan() {
            if(sloganIdx < slogan.length) {
                document.getElementById('slogan-text').innerHTML += slogan.charAt(sloganIdx);
                sloganIdx++;
                setTimeout(typeSlogan, 100);
            } else {
                setTimeout(() => { document.getElementById('slogan-text').innerHTML = ""; sloganIdx = 0; typeSlogan(); }, 3000);
            }
        }
        typeSlogan();

        // 2. AUTH & PROFILE
        function handleCredentialResponse(r) {
            const d = JSON.parse(atob(r.credential.split('.')[1]));
            db.ref('users/' + btoa(d.email)).once('value', s => {
                if(!s.exists()) {
                    db.ref('users/' + btoa(d.email)).set({
                        email: d.email, name: d.name, img: d.picture, tokens: 100, deviceId: navigator.userAgent, status: 'active'
                    });
                }
                localStorage.setItem('akiya_session', btoa(d.email));
                location.reload();
            });
        }

        window.onload = () => {
            const session = localStorage.getItem('akiya_session');
            if(session) {
                db.ref('users/' + session).on('value', s => {
                    userData = s.val();
                    if(userData.status === 'blocked') {
                        showBlockScreen(userData.blockReason, userData.blockUntil);
                        return;
                    }
                    document.getElementById('auth-area').style.display = 'none';
                    document.getElementById('user-profile-nav').style.display = 'flex';
                    document.getElementById('nav-user-pfp').src = userData.img;
                    document.getElementById('nav-tokens').innerText = userData.tokens;
                    if(userData.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
                });
            }
            renderLinks();
        };

        // 3. RENDER LINKS
        function renderLinks() {
            const grid = document.getElementById('home-grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            db.ref('links').on('value', s => {
                grid.innerHTML = "";
                const data = s.val();
                for(let id in data) {
                    let l = data[id];
                    if(l.title.toLowerCase().includes(search)) {
                        grid.innerHTML += `
                        <div class="link-card">
                            ${!userData ? `<div class="card-locked-overlay">
                                <i class="fas fa-lock" style="font-size:30px; color:var(--red)"></i>
                                <p style="font-size:10px; margin-top:10px;">LOGIN TO VIEW</p>
                            </div>` : ''}
                            <img src="dragon.png" style="width:50px; border-radius:10px;">
                            <h3 style="margin:10px 0; font-size:15px;">${l.title}</h3>
                            <button class="glow-btn" onclick="viewLinkDetail('${id}')">VIEW DETAILS</button>
                        </div>`;
                    }
                }
            });
        }

        // 4. LINK DETAIL & TOKEN DEDUCTION
        function viewLinkDetail(id) {
            if(userData.tokens < 20) {
                alert("ඔබේ Tokens ඉවරයි! කරුණාකර Shop එකෙන් Tokens ලබාගන්න.");
                openShop();
                return;
            }

            db.ref('links/' + id).once('value', s => {
                const l = s.val();
                const detailPage = document.getElementById('link-detail-view');
                const content = document.getElementById('detail-content');
                
                content.innerHTML = `
                    <div style="text-align:center;">
                        <img src="dragon.png" style="width:120px; border-radius:20px; border:2px solid var(--red);">
                        <h1 style="color:var(--red)">${l.title}</h1>
                        <p style="color:#888;">Category: Official Group</p>
                        <div style="background:#111; padding:20px; border-radius:15px; margin:20px 0;">
                            <p>${l.desc || 'No description provided.'}</p>
                        </div>
                        <button class="glow-btn" style="font-size:18px; width:100%; background:var(--red); color:white;" onclick="deductAndJoin('${id}', '${l.url}')">JOIN NOW (-20 TOKENS)</button>
                        
                        <div class="rules-box">
                            <p><b>Rules:</b></p>
                            <p>🇱🇰 ලින්ක් එකට ජොයින් වූ පසු අශෝභන ලෙස හැසිරීමෙන් වළකින්න.</p>
                            <p>🇺🇸 Do not engage in spam or misbehavior after joining.</p>
                            <p>🇮🇳 இணைந்த பிறகு தவறாக நடக்க வேண்டாம்.</p>
                        </div>

                        <div class="comment-section">
                            <h4>COMMENTS</h4>
                            <div class="comment-box">
                                <input type="text" id="c-input" class="comment-input" placeholder="Add a comment...">
                                <button class="glow-btn" onclick="postComment('${id}')">POST</button>
                            </div>
                            <div id="comments-list"></div>
                        </div>
                    </div>
                `;
                loadComments(id);
                detailPage.style.display = 'block';
            });
        }

        function deductAndJoin(id, url) {
            db.ref('users/' + localStorage.getItem('akiya_session')).transaction(user => {
                if(user) {
                    user.tokens -= 20;
                }
                return user;
            }, () => { window.open(url); });
        }

        // 5. COMMENT SYSTEM
        function postComment(linkId) {
            const txt = document.getElementById('c-input').value;
            if(!txt) return;
            db.ref('comments/' + linkId).push({
                name: userData.name,
                img: userData.img,
                text: txt,
                time: Date.now()
            });
            document.getElementById('c-input').value = "";
        }

        function loadComments(linkId) {
            db.ref('comments/' + linkId).on('value', s => {
                const list = document.getElementById('comments-list');
                list.innerHTML = "";
                const data = s.val();
                let items = [];
                for(let id in data) items.push(data[id]);
                items.reverse().forEach(c => {
                    list.innerHTML += `
                        <div class="user-comment">
                            <img src="${c.img}" style="width:30px; height:30px; border-radius:50%;">
                            <div>
                                <div style="font-size:11px; color:var(--gold); font-weight:bold;">${c.name}</div>
                                <div style="font-size:13px;">${c.text}</div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // 6. BLOCK SYSTEM
        function showBlockScreen(reason, until) {
            document.getElementById('block-screen').style.display = 'flex';
            document.getElementById('block-reason').innerText = "Reason: " + reason;
            const timer = setInterval(() => {
                const now = Date.now();
                const diff = until - now;
                if(diff <= 0) {
                    clearInterval(timer);
                    db.ref('users/' + localStorage.getItem('akiya_session')).update({status: 'active'});
                    location.reload();
                }
                const days = Math.floor(diff / (1000*60*60*24));
                const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
                document.getElementById('block-timer').innerText = `${days}d ${hours}h ${mins}m Remaining`;
            }, 1000);
        }

        // FIRE CURSOR & CANVAS (MAIN BASE SAVED)
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        window.onmousemove = (e) => {
            document.getElementById('cursor-fire').style.left = e.clientX+'px';
            document.getElementById('cursor-fire').style.top = e.clientY+'px';
            for(let i=0; i<3; i++) particles.push({x: e.clientX, y: e.clientY, s: Math.random()*3+1, vy: -Math.random()*3, a: 1});
        };
        function animateFire() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => { 
                p.y += p.vy; p.a -= 0.015; 
                ctx.fillStyle = `rgba(255, ${Math.random()*100}, 0, ${p.a})`; 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); 
                if(p.a <= 0) particles.splice(i, 1); 
            });
            requestAnimationFrame(animateFire);
        }
        animateFire();

        // HELPERS
        function showPage(p) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(p).classList.add('active'); window.scrollTo(0,0); }
        function openShop() { document.getElementById('shop-modal').style.display = 'block'; }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }
        function closeDetail() { document.getElementById('link-detail-view').style.display = 'none'; }
        function buyTokens(amt, price) { window.open(`https://wa.me/94755751816?text=I%20want%20to%20buy%20${amt}%20Tokens%20for%20LKR%20${price}`); }
    </script>
</body>
</html>
