<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | ULTIMATE 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --red: #ff0000; --black: #000; --gold: #ffd700; --glass: rgba(0,0,0,0.9); }
        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* 🔥 LIVE BACKGROUND SYSTEM */
        #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; }
        .spider-web { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity: 0.3; z-index:-1; }

        /* 🧭 NAV & LOGO */
        nav { position: fixed; top: 0; width: 100%; background: var(--glass); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 1000; border-bottom: 2px solid var(--red); box-shadow: 0 0 20px var(--red); }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .main-logo { width: 50px; height: 50px; filter: drop-shadow(0 0 10px red); }

        /* 🏠 LINK CARDS */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1300px; margin: 100px auto; }
        .link-card { background: #050505; border: 1px solid #222; border-radius: 15px; overflow: hidden; position: relative; }
        .card-banner { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }

        /* 👑 ADMIN PANEL TAB */
        .admin-tab { background: #111; border: 2px solid var(--gold); padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 800px; }

        /* 🕷️ ABOUT SECTION (GAMMATA) */
        .about-wrap { position: relative; padding: 50px; background: rgba(10,0,0,0.9); border: 2px solid var(--red); border-radius: 30px; box-shadow: 0 0 50px rgba(255,0,0,0.5); overflow: hidden; }
        .about-wrap::before { content: '🕷️'; position: absolute; top: 10px; right: 10px; font-size: 40px; opacity: 0.5; }
        .akiya-img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid var(--red); box-shadow: 0 0 30px var(--red); animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 10px var(--red); } 50% { box-shadow: 0 0 40px var(--red); } 100% { box-shadow: 0 0 10px var(--red); } }

        /* 💠 BUTTONS */
        .btn-glowing { background: var(--red); border: none; color: white; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--red); }
        .btn-glowing:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--red); }

        .input-box { background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .section { display: none; padding-top: 100px; }
        .active { display: block; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <img src="https://i.imgur.com/8mY8n0T.png" class="spider-web"> <nav>
        <div class="logo-area">
            <img src="dragon.png" class="main-logo" alt="LOGO">
            <span style="color:red; font-size: 20px; font-weight: 900;">AKIYA 龍</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="admin-link" style="display:none; color:gold; cursor:pointer;" onclick="showPage('admin-panel')"><i class="fas fa-user-shield"></i> ADMIN</div>
            <button class="btn-glowing" onclick="showPage('add-link')">+ ADD LINK</button>
            <div onclick="showPage('profile')" style="cursor:pointer;"><i class="fas fa-coins" style="color:gold;"></i> <span id="u-tokens">0</span></div>
        </div>
    </nav>

    <div id="home" class="section active">
        <div class="link-grid" id="main-link-container"></div>
    </div>

    <div id="add-link" class="section">
        <div style="max-width:500px; margin:auto; background:var(--glass); padding:30px; border-radius:20px; border:1px solid var(--red);">
            <h2 style="color:red;">🐉 POST NEW LINK (20 TK)</h2>
            <input type="text" id="ln-title" class="input-box" placeholder="Link Name (e.g. My YT Channel)">
            <input type="text" id="ln-url" class="input-box" placeholder="Paste URL Here">
            <textarea id="ln-desc" class="input-box" placeholder="Link Description (Tell about it...)"></textarea>
            <select id="ln-cat" class="input-box">
                <option value="Groups">WhatsApp Groups</option>
                <option value="Channels">Telegram Channels</option>
                <option value="Social">Social Media</option>
            </select>
            <p>Upload Banner (PC/Mobile):</p>
            <input type="file" id="ln-img" class="input-box">
            <button class="btn-glowing" style="width:100%;" onclick="uploadLink()">PUBLISH NOW</button>
        </div>
    </div>

    <div id="profile" class="section">
        <div style="max-width:500px; margin:auto; text-align:center; background:var(--glass); padding:30px; border-radius:20px;">
            <img id="my-pfp" style="width:100px; height:100px; border-radius:50%; border:3px solid red;">
            <h2 id="my-name-tag">User Name</h2>
            <input type="text" id="p-name" class="input-box" placeholder="Full Name">
            <input type="text" id="p-loc" class="input-box" placeholder="Location">
            <input type="number" id="p-age" class="input-box" placeholder="Age">
            <button class="btn-glowing" onclick="saveProfile()">SAVE PROFILE</button>
        </div>
    </div>

    <div id="admin-panel" class="section">
        <div class="admin-tab">
            <h2 style="color:gold;">👑 DRAGON ADMIN CONTROL</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div style="background:#222; padding:15px; border-radius:10px;">
                    <h4>Set Token Price (LKR)</h4>
                    <input type="number" id="set-price" class="input-box" placeholder="1000 Tokens Price">
                    <button class="btn-glowing" onclick="updatePrice()">UPDATE PRICE</button>
                </div>
                <div style="background:#222; padding:15px; border-radius:10px;">
                    <h4>Live Visitors: <span id="live-total" style="color:lime;">0</span></h4>
                    <button class="btn-glowing" style="background:gray;" onclick="showPage('home')">BACK</button>
                </div>
            </div>
            <hr>
            <h3>Admin Profile Edit</h3>
            <input type="text" id="adm-edu" class="input-box" placeholder="Education">
            <input type="text" id="adm-web" class="input-box" placeholder="About Website">
            <button class="btn-glowing" onclick="saveAdminAbout()">UPDATE MY ABOUT</button>
        </div>
    </div>

    <div id="about" class="section">
        <div style="max-width:800px; margin:auto;" class="about-wrap">
            <div style="text-align:center;">
                <img src="akiya.png" class="akiya-img">
                <h1 style="color:red; text-shadow: 0 0 20px red;">AKIYA 龍</h1>
                <div style="font-size: 18px; line-height: 2;">
                    <p>🎓 <b>Education:</b> <span id="dis-edu">By Akiya</span></p>
                    <p>📍 <b>Location:</b> <span id="dis-loc">Sri Lanka 🇱🇰</span></p>
                    <p>🎂 <b>Age:</b> <span id="dis-age">20+</span></p>
                    <p>🐉 <b>About Web:</b> <span id="dis-web">ශ්‍රී ලංකාවේ ප්‍රබලම ඩිජිටල් ප්‍රජාව.</span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🛡️ FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();
        let userData = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                const uid = user.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).on('value', snap => {
                    userData = snap.val();
                    if(!userData) {
                        userData = { tokens: 100, name: user.displayName, pfp: user.photoURL, email: user.email };
                        db.ref('users/' + uid).set(userData);
                    }
                    
                    // 👑 UNLIMITED TOKENS FOR ADMIN
                    if(user.email === "kaviakiya@gmail.com") {
                        userData.tokens = 999999999;
                        document.getElementById('admin-link').style.display = 'block';
                    }
                    
                    loadUI();
                });
                db.ref('presence/' + uid).set(true);
                db.ref('presence/' + uid).onDisconnect().remove();
            } else { location.href = "#login"; }
        });

        function loadUI() {
            document.getElementById('u-tokens').innerText = userData.tokens;
            document.getElementById('my-pfp').src = userData.pfp;
            document.getElementById('my-name-tag').innerText = userData.name;
            renderLinks();
            loadAboutData();
            updateLiveCount();
        }

        function saveProfile() {
            const uid = userData.email.replace(/[.#$[\]]/g, "_");
            const update = {
                name: document.getElementById('p-name').value,
                loc: document.getElementById('p-loc').value,
                age: document.getElementById('p-age').value
            };
            db.ref('users/' + uid).update(update).then(() => alert("Profile Updated! 🔥"));
        }

        function uploadLink() {
            if(userData.tokens < 20) return alert("No Tokens!");
            const title = document.getElementById('ln-title').value;
            const url = document.getElementById('ln-url').value;
            const desc = document.getElementById('ln-desc').value;
            const cat = document.getElementById('ln-cat').value;
            const file = document.getElementById('ln-img').files[0];

            const reader = new FileReader();
            reader.onloadend = () => {
                db.ref('links').push({ title, url, desc, cat, img: reader.result, owner: userData.name });
                const uid = userData.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).update({ tokens: userData.tokens - 20 });
                showPage('home');
            };
            reader.readAsDataURL(file);
        }

        function renderLinks() {
            db.ref('links').on('value', snap => {
                const cont = document.getElementById('main-link-container');
                cont.innerHTML = "";
                snap.forEach(c => {
                    const l = c.val();
                    cont.innerHTML += `
                        <div class="link-card">
                            <img src="${l.img}" class="card-banner">
                            <div class="card-content">
                                <small style="color:red;">${l.cat}</small>
                                <h3>${l.title}</h3>
                                <p style="font-size:12px; color:#ccc;">${l.desc}</p>
                                <a href="${l.url}" target="_blank" class="btn-glowing" style="display:block; text-align:center; text-decoration:none;">VISIT LINK</a>
                            </div>
                        </div>`;
                });
            });
        }

        // ADMIN FUNCTIONS
        function saveAdminAbout() {
            db.ref('site_about').set({
                edu: document.getElementById('adm-edu').value,
                web: document.getElementById('adm-web').value
            });
            alert("About Page Updated!");
        }

        function loadAboutData() {
            db.ref('site_about').on('value', snap => {
                const d = snap.val();
                if(d) {
                    document.getElementById('dis-edu').innerText = d.edu;
                    document.getElementById('dis-web').innerText = d.web;
                }
            });
        }

        function updateLiveCount() {
            db.ref('presence').on('value', s => {
                document.getElementById('live-total').innerText = s.numChildren();
            });
        }

        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
        }

        // 🔥 LIVE BG PARTICLES
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        function createP() {
            for(let i=0; i<2; i++) particles.push({x: Math.random()*canvas.width, y: canvas.height, s: Math.random()*3, v: Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,0,0,0.5)";
            particles.forEach((p, i) => {
                p.y -= p.v;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                if(p.y < 0) particles.splice(i,1);
            });
            createP();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
