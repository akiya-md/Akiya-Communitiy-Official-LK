        .group-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; padding: 20px; }
        .group-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; width: 150px; text-align: center; transition: 0.3s; }

        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .link-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border-top: 3px solid var(--red); transition: 0.3s; }
        .link-card:hover { transform: translateY(-5px); box-shadow: var(--glow); }

        .comment-section { max-width: 800px; margin: 40px auto; padding: 20px; background: rgba(15,15,15,0.8); border-radius: 15px; border: 1px solid #222; }
        .comment-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        .comment-input-box button { background: var(--red); border: none; padding: 10px 20px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        .comment-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .comment-item { background: #181818; padding: 12px; border-radius: 10px; border-left: 3px solid var(--red); font-size: 13px; }
        .comment-item span { color: var(--red); font-weight: bold; font-size: 11px; display: block; margin-bottom: 4px; }

        #login-overlay { position: fixed; inset: 0; z-index: 2500; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        #content-wrapper { filter: blur(25px); pointer-events: none; opacity: 0; transition: 1s; }

    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk",
            storageBucket: "akiya-communitiy-official-lk.firebasestorage.app",
            messagingSenderId: "180586817754",
            appId: "1:180586817754:web:c505feb010c7c67c15dde3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;

        getRedirectResult(auth).catch((error) => console.error(error));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.body.classList.add('unlocked');
                document.getElementById('login-overlay').style.display = 'none';
                if(["kaviakiya@gmail.com", "dewshanakiya@gmail.com"].includes(user.email)) {
                    document.getElementById('admin-panel').style.display = 'block';
                }
            }
        });

        window.login = () => {
            setPersistence(auth, browserLocalPersistence).then(() => {
                return signInWithRedirect(auth, provider);
            });
        };

        // 🟢 OLD STYLE BOLA GINI PUPURU LOGIC
        document.addEventListener('mousemove', function(e) {
            for (let i = 0; i < 3; i++) { // එක පාර පුපුරු 3ක් හදනවා
                createParticle(e.clientX, e.clientY);
            }
        });

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle';
            document.body.appendChild(p);

            const size = Math.random() * 8 + 2;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            
            // පාටවල් මාරු වෙන්න (ගින්දර වගේ)
            const colors = ['#ff0000', '#ff8c00', '#ffff00', '#ffffff'];
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.boxShadow = `0 0 10px ${p.style.background}`;

            let posX = x;
            let posY = y;
            
            // පැත්තට විසිවෙන වේගය (Physics)
            let velX = (Math.random() - 0.5) * 8;
            let velY = (Math.random() - 0.5) * 8;
            let opacity = 1;

            function update() {
                posX += velX;
                posY += velY;
                velY += 0.1; // ගුරුත්වාකර්ෂණය (පහළට වැටෙන්න)
                opacity -= 0.02;

                p.style.left = `${posX}px`;
                p.style.top = `${posY}px`;
                p.style.opacity = opacity;

                if (opacity > 0) {
                    requestAnimationFrame(update);
                } else {
                    p.remove();
                }
            }
            update();
        }

        // Firebase Other Functions (Links/Comments)
        window.publish = () => {
            const t = document.getElementById('title').value;
            const u = document.getElementById('url').value;
            if(t && u) push(ref(db, 'links'), { name: t, url: u });
        };

        onValue(ref(db, 'links'), (snap) => {
            const grid = document.getElementById('linkGrid'); grid.innerHTML = "";
            if(snap.val()) Object.values(snap.val()).reverse().forEach(l => {
                grid.innerHTML += `<div class="link-card"><h3>${l.name}</h3><a href="${l.url}" target="_blank" style="color:red; text-decoration:none; font-weight:bold;">ACCESS 🔥</a></div>`;
            });
        });

        let v = localStorage.getItem('vCount') || 1240;
        localStorage.setItem('vCount', ++v);
        document.getElementById('count').innerText = v.toLocaleString();
    </script>
