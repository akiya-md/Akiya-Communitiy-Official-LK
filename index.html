    <script>
        // 1. MULTI-LANGUAGE WELCOME
        const words = ["ආයුබෝවන්", "WELCOME", "வரவேற்பු"];
        let counter = 0;
        setInterval(() => {

            counter = (counter + 1) % words.length;
        }, 2000);

        // 2. GOOGLE LOGIN & PERSISTENCE
        function openLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
        function closeLogin() { document.getElementById('login-overlay').style.display = 'none'; }

        function handleCredentialResponse(response) {
            localStorage.setItem('akiya_auth', 'true'); // Month persistence logic
            localStorage.setItem('auth_date', Date.now());
            checkAuth();
            closeLogin();
        }

        function checkAuth() {
            const auth = localStorage.getItem('akiya_auth');
            const savedDate = localStorage.getItem('auth_date');
            const oneMonth = 30 * 24 * 60 * 60 * 1000;

            if (auth === 'true' && (Date.now() - savedDate < oneMonth)) {
                document.getElementById('main-content').style.filter = "none";
                document.getElementById('main-content').style.pointerEvents = "auto";
                document.getElementById('login-btn').innerText = "LOGGED IN";
            }
        }
        window.onload = checkAuth;

        // 3. FIRE SPARKS ENGINE
        const canvas = document.getElementById('fire-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.alpha = 1;
                this.size = Math.random() * 3;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 69, 0, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.alpha -= 0.01;
            }
        }

        // Mouse Trail
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) particles.push(new Particle(e.clientX, e.clientY, Math.random()*2-1, Math.random()*2-1));
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Random sparks from bottom
            if(Math.random() < 0.1) particles.push(new Particle(Math.random()*canvas.width, canvas.height, 0, -Math.random()*3));
            
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 4. LINK SYSTEM (ADMIN DATA)
        const links = [
            { name: "Premium Movie 1", cat: "Movies", url: "#" },
            { name: "Pro Software 1", cat: "Apps", url: "#" }
        ];

        const container = document.getElementById('link-container');

            container.innerHTML += `<div class="link-card"><h3>${l.name}</h3><p>${l.cat}</p><button class="btn" onclick="window.open('${l.url}')">GO TO LINK</button></div>`;
        });
