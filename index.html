<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026 PRO v4.0</title>
    
    <link rel="icon" type="image/png" href="dragon.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff1100; --black: #000000; --gold: #ffd700; --glass: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.7; }
        nav { position: fixed; top: 0; width: 100%; background: var(--glass); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 1000; border-bottom: 2px solid var(--red); }
        
        .section { display: none; padding: 90px 15px 60px; min-height: 100vh; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🐲 CARDS */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .link-card { background: var(--glass); border: 1px solid #222; padding: 15px; border-radius: 20px; position: relative; transition: 0.3s; }
        .link-card:hover { border-color: var(--red); transform: translateY(-5px); }
        .card-dragon { position: absolute; top: 10px; right: 10px; width: 25px; filter: drop-shadow(0 0 5px red); }
        .admin-tools { position: absolute; top: 40px; right: 10px; display: none; flex-direction: column; gap: 5px; }

        /* 🔘 BUTTONS */
        .glow-btn { padding: 10px 20px; background: transparent; border: 2px solid var(--red); color: var(--red); font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }
        .home-back { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: none; }

        /* 📂 CATEGORY BAR */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px; margin-bottom: 20px; sticky: top; background: black; }
        .cat-item { padding: 8px 18px; background: #111; border-radius: 50px; border: 1px solid #333; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .cat-active { background: var(--red); border-color: var(--red); }

        /* 👤 PROFILE FORM */
        .profile-card { max-width: 500px; margin: auto; background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid var(--red); }
        .profile-input { width: 100%; margin: 8px 0; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="fire-canvas"></canvas>
    <button class="glow-btn home-back" id="global-home-btn" onclick="showPage('home')"><i class="fas fa-home"></i> HOME</button>

    <nav id="main-nav" style="display:none;">
        <div style="color:red; font-weight:bold;"><img src="dragon.png" width="25"> AKIYA 龍</div>
        <div id="token-display" style="color:gold;"><i class="fas fa-coins"></i> 0</div>
        <img id="nav-pfp" onclick="showPage('profile')" style="width:35px; height:35px; border-radius:50%; border:2px solid red; cursor:pointer; object-fit: cover;">
    </nav>

    <div id="login-screen" class="section active">
        <div style="text-align:center; padding-top: 50px;">
            <img src="dragon.png" width="120" style="animation: float 3s infinite ease-in-out;">
            <h2 style="color:red;">AKIYA 龍 2026 PRO</h2>
            <button id="google-btn" class="glow-btn" style="width:280px; border-color:#4285F4; color:#4285F4;">
                <i class="fab fa-google"></i> GOOGLE LOGIN
            </button>
        </div>
    </div>

    <div id="home" class="section">
        <div class="cat-bar" id="cat-scroll">
            <div class="cat-item cat-active" onclick="renderLinks('All')">All</div>
            <div class="cat-item" onclick="renderLinks('WhatsApp')">WhatsApp</div>
            <div class="cat-item" onclick="renderLinks('Telegram')">Telegram</div>
            <div class="cat-item" onclick="renderLinks('Tech')">Tech</div>
            <div class="cat-item" onclick="renderLinks('18+')">18+</div>
        </div>
        
        <div id="admin-panel" style="display:none; background:#111; padding:20px; border-radius:20px; border:1px solid gold; margin-bottom:30px;">
            <h3 style="color:gold;">🐉 ADD NEW LINK (-20 Tokens)</h3>
            <input type="text" id="link-t" class="profile-input" placeholder="Title">
            <input type="text" id="link-u" class="profile-input" placeholder="URL">
            <input type="file" id="link-img" class="profile-input">
            <button class="glow-btn" onclick="publishLink()">PUBLISH NOW</button>
        </div>

        <div class="link-grid" id="home-grid"></div>
    </div>

    <div id="profile" class="section">
        <div class="profile-card">
            <div style="text-align:center;">
                <label for="pfp-upload">
                    <img id="prof-img-display" src="dragon.png" style="width:100px; height:100px; border-radius:50%; border:3px solid red; cursor:pointer; object-fit: cover;">
                </label>
                <input type="file" id="pfp-upload" style="display:none;" onchange="uploadProfilePic(this)">
                <p style="font-size:10px; color:#666;">Click image to change DP</p>
            </div>
            <input type="text" id="u-name" class="profile-input" placeholder="Name">
            <input type="number" id="u-age" class="profile-input" placeholder="Age">
            <input type="text" id="u-loc" class="profile-input" placeholder="Location">
            <input type="text" id="u-phone" class="profile-input" placeholder="Phone Number">
            <select id="u-gender" class="profile-input">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>
            <button class="glow-btn" style="width:100%; margin-top:10px;" onclick="saveUserProfile()">SAVE PROFILE</button>
            <button class="glow-btn" style="width:100%; margin-top:10px; border-color:gray; color:gray;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth(), ADMIN_EMAIL = "kaviakiya@gmail.com";

        // 🛡️ PERSISTENT LOGIN & SESSION
        auth.onAuthStateChanged(user => {
            if (user) {
                const uid = user.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).on('value', snap => {
                    let data = snap.val();
                    if(!data) {
                        data = { tokens: 100, name: user.displayName, email: user.email, pfp: user.photoURL };
                        db.ref('users/' + uid).set(data);
                    }
                    updateUI(data, user);
                });
            } else {
                showPage('login-screen');
            }
        });

        function updateUI(data, user) {
            document.getElementById('token-display').innerHTML = `<i class="fas fa-coins"></i> ${data.tokens}`;
            document.getElementById('nav-pfp').src = data.pfp || 'dragon.png';
            document.getElementById('prof-img-display').src = data.pfp || 'dragon.png';
            document.getElementById('u-name').value = data.name || '';
            document.getElementById('u-age').value = data.age || '';
            document.getElementById('u-loc').value = data.location || '';
            document.getElementById('u-phone').value = data.phone || '';
            document.getElementById('u-gender').value = data.gender || 'Boy';
            
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('home').classList.add('active');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('global-home-btn').style.display = 'block';

            if(user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
            renderLinks();
        }

        // 📤 UPLOAD DP (BASE64 for Mobile/PC Compatibility)
        function uploadProfilePic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('prof-img-display').src = e.target.result;
                    const uid = auth.currentUser.email.replace(/[.#$[\]]/g, "_");
                    db.ref('users/' + uid).update({ pfp: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveUserProfile() {
            const uid = auth.currentUser.email.replace(/[.#$[\]]/g, "_");
            const update = {
                name: document.getElementById('u-name').value,
                age: document.getElementById('u-age').value,
                location: document.getElementById('u-loc').value,
                phone: document.getElementById('u-phone').value,
                gender: document.getElementById('u-gender').value
            };
            db.ref('users/' + uid).update(update).then(() => alert("Profile Saved! 🔥"));
        }

        // 🚀 PUBLISH & TOKENS
        function publishLink() {
            const uid = auth.currentUser.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + uid + '/tokens').once('value', s => {
                if(s.val() >= 20) {
                    const title = document.getElementById('link-t').value;
                    const url = document.getElementById('link-u').value;
                    const file = document.getElementById('link-img').files[0];
                    
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        db.ref('links').push({ title, url, img: reader.result, category: 'All', owner: auth.currentUser.email });
                        db.ref('users/' + uid + '/tokens').set(s.val() - 20);
                        alert("Published! -20 Tokens");
                    };
                    if(file) reader.readAsDataURL(file); else reader.onloadend();
                } else alert("Tokens මදි!");
            });
        }

        function renderLinks(filter = 'All') {
            db.ref('links').on('value', snap => {
                const grid = document.getElementById('home-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const l = child.val();
                    if(filter !== 'All' && l.category !== filter) return;
                    
                    const isAdmin = auth.currentUser && auth.currentUser.email === ADMIN_EMAIL;
                    grid.innerHTML += `
                        <div class="link-card">
                            <img src="dragon.png" class="card-dragon">
                            <img src="${l.img || 'dragon.png'}" style="width:100%; height:150px; object-fit:cover; border-radius:10px;">
                            <h3>${l.title}</h3>
                            <div style="display:flex; justify-content:space-between;">
                                <button class="glow-btn" style="padding:5px 15px;" onclick="window.open('${l.url}')">JOIN</button>
                                ${isAdmin ? `<button onclick="deleteLink('${child.key}')" style="background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        function deleteLink(id) { if(confirm("Delete this link?")) db.ref('links/' + id).remove(); }

        document.getElementById('google-btn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        
        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            window.scrollTo(0,0);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // FIRE BG
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        window.onmousemove = (e) => { for(let i=0; i<2; i++) particles.push({x:e.clientX, y:e.clientY, a:1, s:Math.random()*2}); };
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.y -= 1; p.a -= 0.02;
                ctx.fillStyle = `rgba(255,40,0,${p.a})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
                if(p.a <=0) particles.splice(i,1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
