<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | THE ULTIMATE</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff0000; --dark-red: #8b0000; --gold: #ffd700; --black: #050505; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        body { 
            margin: 0; background: var(--black); color: white; font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; background-attachment: fixed;
        }

        /* 🌌 LIVE MAGIC BACKGROUND & SPIDER WEB */
        #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; }
        .spider-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: url('https://www.transparenttextures.com/patterns/spider-web.png'); 
            opacity: 0.12; z-index:-1; pointer-events: none; 
        }

        /* 🧭 NAV BAR (PC & MOBILE OPTIMIZED) */
        nav { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); display: flex; justify-content: space-between; 
            align-items: center; padding: 12px 25px; z-index: 1000; border-bottom: 2px solid var(--red);
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--red); object-fit: cover; box-shadow: 0 0 10px red; }
        .nav-brand span { font-family: 'Orbitron'; font-weight: 900; color: var(--red); font-size: 20px; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 100px auto 40px; padding: 0 20px; }
        .section { display: none; animation: slideUp 0.5s ease forwards; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* 💎 BUTTONS & INPUTS */
        .btn-dragon { 
            background: linear-gradient(45deg, var(--dark-red), var(--red));
            border: none; color: white; padding: 12px 24px; border-radius: 10px;
            font-weight: 900; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255,0,0,0.4);
        }
        .btn-dragon:hover { letter-spacing: 2px; transform: scale(1.05); }
        .btn-back { background: #222; border: 1px solid #444; margin-bottom: 20px; }

        .input-dragon { 
            background: #111; border: 1px solid #333; color: white; padding: 15px; 
            border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none;
        }
        .input-dragon:focus { border-color: var(--red); box-shadow: 0 0 15px rgba(255,0,0,0.2); }

        /* 🏠 LINK CARDS */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .dragon-card { 
            background: #0a0a0a; border: 1px solid #222; border-radius: 20px; overflow: hidden;
            position: relative; transition: 0.4s;
        }
        .dragon-card:hover { border-color: var(--red); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(255,0,0,0.2); }
        .card-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--red); }
        .card-body { padding: 20px; }

        /* 🕷️ ABOUT PAGE (FOUNDER CARD) */
        .about-card {
            background: linear-gradient(135deg, #121212 0%, #1a0000 100%);
            border: 2px solid var(--red); border-radius: 30px; padding: 50px 30px;
            text-align: center; position: relative; box-shadow: 0 0 50px rgba(255,0,0,0.3);
        }
        .founder-dp { 
            width: 180px; height: 180px; border-radius: 50%; border: 5px solid var(--red);
            margin-bottom: 20px; box-shadow: 0 0 30px var(--red); object-fit: cover;
        }

        /* 🛡️ ADMIN PANEL */
        .admin-box { background: rgba(20,0,0,0.9); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="spider-overlay"></div>

    <nav>
        <div class="nav-brand" onclick="showPage('home')">
            <img src="" id="nav-akiya-logo" class="nav-logo" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=A'">
            <span>AKIYA 龍</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="admin-link" style="display:none; color:var(--gold); cursor:pointer;" onclick="showPage('admin')"><i class="fas fa-crown"></i></div>
            <div style="color:#00ff00; font-size:12px; font-weight:bold;"><i class="fas fa-circle"></i> <span id="live-users">1</span> LIVE</div>
            <div style="color:var(--gold); font-weight:bold;"><i class="fas fa-coins"></i> <span id="user-tokens">0</span></div>
            <img id="nav-user-pfp" onclick="showPage('profile')" style="width:38px; height:38px; border-radius:50%; border:2px solid white; cursor:pointer;">
        </div>
    </nav>

    <div class="container">
        
        <div id="home" class="section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="font-family:'Orbitron';">REALM <span style="color:red;">FEED</span></h2>
                <button class="btn-dragon" onclick="showPage('add-link')">PUBLISH +</button>
            </div>
            <div class="link-grid" id="main-feed"></div>
        </div>

        <div id="add-link" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-times"></i> CLOSE</button>
            <div style="max-width:600px; margin:auto; background:rgba(10,10,10,0.9); padding:40px; border-radius:25px; border:1px solid var(--red);">
                <h2 style="font-family:'Orbitron'; text-align:center;">NEW <span style="color:red;">DISCOVERY</span></h2>
                <input type="text" id="l-title" class="input-dragon" placeholder="Project Name">
                <input type="text" id="l-url" class="input-dragon" placeholder="Destination URL (https://...)">
                <textarea id="l-desc" class="input-dragon" style="height:100px" placeholder="Short Description..."></textarea>
                <select id="l-cat" class="input-dragon">
                    <option value="WhatsApp">WhatsApp Community</option>
                    <option value="Telegram">Telegram Group</option>
                    <option value="YouTube">YouTube Channel</option>
                    <option value="TikTok">TikTok Official</option>
                </select>
                <p style="font-size:12px; color:gray;">Upload Banner (Image):</p>
                <input type="file" id="l-file" class="input-dragon" accept="image/*">
                <button class="btn-dragon" style="width:100%" id="pub-btn" onclick="publishLink()">IGNITE PUBLISH</button>
            </div>
        </div>

        <div id="profile" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div style="max-width:500px; margin:auto; text-align:center; background:rgba(10,10,10,0.9); padding:40px; border-radius:25px;">
                <img id="p-img" class="founder-dp">
                <h2 id="p-name-tag" style="font-family:'Orbitron';">USER</h2>
                <input type="text" id="u-name" class="input-dragon" placeholder="Display Name">
                <input type="text" id="u-edu" class="input-dragon" placeholder="Education">
                <input type="text" id="u-loc" class="input-dragon" placeholder="Location">
                <input type="number" id="u-age" class="input-dragon" placeholder="Age">
                <button class="btn-dragon" style="width:100%" onclick="updateUser()">SAVE CHANGES</button>
                <button class="btn-dragon" style="width:100%; margin-top:10px; background:gray;" onclick="showPage('about')">ABOUT FOUNDER</button>
                <p onclick="auth.signOut()" style="color:red; cursor:pointer; margin-top:20px;">Logout Realm</p>
            </div>
        </div>

        <div id="about" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="about-card">
                <div style="position:absolute; top:20px; right:20px; font-size:40px; color:red; opacity:0.3;"><i class="fas fa-dragon"></i></div>
                <img id="ab-img" class="founder-dp" src="">
                <h1 id="ab-name" style="font-family:'Orbitron'; color:var(--red); font-size:35px; margin:10px 0;">AKIYA</h1>
                <p style="color:var(--gold); letter-spacing:4px; font-size:12px; font-weight:bold;">LEGENDARY FOUNDER</p>
                <div style="text-align:left; max-width:400px; margin:30px auto; border-left:3px solid red; padding-left:20px; line-height:2;">
                    <p><i class="fas fa-user-graduate"></i> <b>Edu:</b> <span id="ab-edu">--</span></p>
                    <p><i class="fas fa-map-marker-alt"></i> <b>From:</b> <span id="ab-loc">--</span></p>
                    <p><i class="fas fa-calendar-day"></i> <b>Age:</b> <span id="ab-age">--</span></p>
                </div>
                <p style="font-size:13px; color:gray;">"Building the strongest digital dragon community in Sri Lanka."</p>
            </div>
        </div>

        <div id="admin" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="admin-box">
                <h2 style="font-family:'Orbitron'; color:var(--gold);"><i class="fas fa-shield-alt"></i> MASTER CONTROL</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                    <div style="background:#000; padding:20px; border-radius:15px; text-align:center;">
                        <h1 id="adm-total-u">0</h1>
                        <p>Total Dragons</p>
                    </div>
                    <div style="background:#000; padding:20px; border-radius:15px; text-align:center;">
                        <h1 id="adm-live-u">0</h1>
                        <p>Currently Online</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();
        let currentU = null;

        // AUTH & SYNC
        auth.onAuthStateChanged(user => {
            if(user) {
                const uid = user.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).on('value', snap => {
                    currentU = snap.val();
                    if(!currentU) {
                        currentU = { name: user.displayName, pfp: user.photoURL, tokens: 100, email: user.email };
                        db.ref('users/' + uid).set(currentU);
                    }
                    if(user.email === "kaviakiya@gmail.com") {
                        currentU.tokens = "INFINITY";
                        document.getElementById('admin-link').style.display = 'block';
                    }
                    syncAllUI();
                });
                db.ref('presence/' + uid).set({name: user.displayName, time: Date.now()});
                db.ref('presence/' + uid).onDisconnect().remove();
            } else { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        });

        function syncAllUI() {
            // Navbar & General
            document.getElementById('nav-user-pfp').src = currentU.pfp;
            document.getElementById('user-tokens').innerText = currentU.tokens;
            document.getElementById('p-img').src = currentU.pfp;
            document.getElementById('p-name-tag').innerText = currentU.name;
            
            // Profile Form
            document.getElementById('u-name').value = currentU.name || "";
            document.getElementById('u-edu').value = currentU.edu || "";
            document.getElementById('u-loc').value = currentU.loc || "";
            document.getElementById('u-age').value = currentU.age || "";

            // About Section (Sync with Admin/Akiya)
            db.ref('users/kaviakiya@gmail_com').on('value', s => {
                const d = s.val();
                if(d) {
                    document.getElementById('nav-akiya-logo').src = d.pfp;
                    document.getElementById('ab-img').src = d.pfp;
                    document.getElementById('ab-name').innerText = d.name;
                    document.getElementById('ab-edu').innerText = d.edu || "Dragon Founder";
                    document.getElementById('ab-loc').innerText = d.loc || "Sri Lanka";
                    document.getElementById('ab-age').innerText = d.age || "22";
                }
            });

            loadFeed();
            loadStats();
        }

        function updateUser() {
            const uid = currentU.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + uid).update({
                name: document.getElementById('u-name').value,
                edu: document.getElementById('u-edu').value,
                loc: document.getElementById('u-loc').value,
                age: document.getElementById('u-age').value
            }).then(() => alert("Akiya Realm Profile Updated! 🔥"));
        }

        // 🚀 PUBLISH LOGIC (FIXED)
        function publishLink() {
            const btn = document.getElementById('pub-btn');
            const title = document.getElementById('l-title').value;
            const url = document.getElementById('l-url').value;
            const desc = document.getElementById('l-desc').value;
            const cat = document.getElementById('l-cat').value;
            const file = document.getElementById('l-file').files[0];

            if(!title || !url || !file) return alert("Fill all fields, Dragon!");
            if(currentU.tokens !== "INFINITY" && currentU.tokens < 20) return alert("Not enough Tokens!");

            btn.innerText = "UPLOADING..."; btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const linkData = {
                    title, url, desc, cat, img: reader.result,
                    owner: currentU.name, owner_pfp: currentU.pfp, time: Date.now()
                };
                db.ref('links').push(linkData).then(() => {
                    if(currentU.tokens !== "INFINITY") {
                        const uid = currentU.email.replace(/[.#$[\]]/g, "_");
                        db.ref('users/' + uid).update({tokens: currentU.tokens - 20});
                    }
                    alert("Published Successfully! 🐉");
                    btn.innerText = "IGNITE PUBLISH"; btn.disabled = false;
                    showPage('home');
                });
            };
        }

        function loadFeed() {
            db.ref('links').on('value', snap => {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = "";
                snap.forEach(child => {
                    const l = child.val();
                    feed.innerHTML += `
                        <div class="dragon-card">
                            <img src="${l.img}" class="card-img">
                            <div class="card-body">
                                <span style="background:red; font-size:10px; padding:3px 8px; border-radius:5px; font-weight:bold;">${l.cat}</span>
                                <h3 style="color:red; margin:10px 0; font-family:Orbitron;">${l.title}</h3>
                                <p style="font-size:12px; color:gray; height:35px; overflow:hidden;">${l.desc}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <img src="${l.owner_pfp}" style="width:25px; height:25px; border-radius:50%; border:1px solid red;">
                                        <span style="font-size:11px;">${l.owner}</span>
                                    </div>
                                    <a href="${l.url}" target="_blank" class="btn-dragon" style="padding:6px 15px; font-size:10px; text-decoration:none;">JOIN</a>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function loadStats() {
            db.ref('presence').on('value', s => {
                document.getElementById('live-users').innerText = s.numChildren();
                document.getElementById('adm-live-u').innerText = s.numChildren();
            });
            db.ref('users').on('value', s => {
                document.getElementById('adm-total-u').innerText = s.numChildren();
            });
        }

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 🌌 BG ANIMATION
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*2; this.sx = Math.random()*0.5-0.25; this.sy = Math.random()*0.5-0.25; }
            draw() { ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
            update() { this.x += this.sx; this.y += this.sy; if(this.x<0||this.x>canvas.width) this.sx*=-1; if(this.y<0||this.y>canvas.height) this.sy*=-1; }
        }
        for(let i=0; i<80; i++) particles.push(new Particle());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
