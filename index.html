    <style>
        :root { --red: #ff1100; --black: #000000; --dark: #0a0a0a; --gold: #ffd700; --glass: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; cursor: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.7; }
        #cursor-fire { position: fixed; width: 12px; height: 12px; background: var(--red); border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 15px var(--red); }

        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 1000; border-bottom: 2px solid var(--red); }
        .nav-logo { color: var(--red); font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }

        .section { display: none; padding: 100px 15px 60px; min-height: 100vh; }
        .active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .login-container { max-width: 400px; margin: 100px auto; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--red); text-align: center; }
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #111; border-radius: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .cat-item { padding: 8px 20px; background: #222; border-radius: 50px; white-space: nowrap; font-size: 13px; cursor: pointer; border: 1px solid #333; }
        .cat-item:hover, .cat-active { background: var(--red); border-color: var(--red); }

        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .link-card { background: var(--glass); border: 1px solid #222; padding: 20px; border-radius: 20px; text-align: center; }
        .link-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }

        .admin-input { width: 100%; margin-bottom: 10px; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; cursor: text; }
        .glow-btn { padding: 12px 24px; background: transparent; border: 2px solid var(--red); color: var(--red); font-weight: bold; border-radius: 50px; cursor: pointer; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: 0 0 20px var(--red); }
        
        .about-card { max-width: 600px; margin: auto; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--red); text-align: center; }
        .about-pfp { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--red); margin-bottom: 15px; object-fit: cover; }
    </style>
</head>

    <nav id="main-nav" style="display:none;">

            <h3>🐲 POST NEW LINK</h3>

            <input type="text" id="link-u" class="admin-input" placeholder="URL">

        <div class="link-grid" id="home-grid"></div>

        function updateProfileUI() {
            const id = isPro ? localStorage.getItem('pro_session') : currentUser.uid;
            db.ref('users/' + id).on('value', s => {
                const d = s.val() || {};
                document.getElementById('nav-user-pfp').src = d.img || currentUser.photoURL || 'dragon.png';
                document.getElementById('prof-img').src = d.img || currentUser.photoURL || 'dragon.png';
                document.getElementById('prof-name').innerText = isPro ? id : (currentUser.displayName || "User");
            });
        }

        function renderLinks(f = 'All') {
            const grid = document.getElementById('home-grid');
            db.ref('links').on('value', s => {
                grid.innerHTML = "";
                const data = s.val();
                for(let id in data) {
                    let l = data[id];
                    if(f !== 'All' && l.category !== f) continue;
                    grid.innerHTML += `<div class="link-card"><img src="${l.img}"><h3>${l.title}</h3><button class="glow-btn" onclick="window.open('${l.url}')">JOIN</button></div>`;
                }
            });
        }

        function filterCat(c) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('cat-active'));
            event.target.classList.add('cat-active');
            renderLinks(c);
        }

        function showPage(p) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
        }

        // FIRE ANIMATION
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        window.onmousemove = (e) => {
            document.getElementById('cursor-fire').style.left = e.clientX+'px';
            document.getElementById('cursor-fire').style.top = e.clientY+'px';
            for(let i=0; i<2; i++) particles.push({x: e.clientX, y: e.clientY, s: Math.random()*2+1, vy: -Math.random()*2, a: 1});
        };
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => { p.y += p.vy; p.a -= 0.02; ctx.fillStyle = `rgba(255,50,0,${p.a})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); if(p.a<=0) particles.splice(i,1); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
