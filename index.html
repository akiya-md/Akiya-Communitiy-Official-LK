
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | Official 2026 v2.0 PRO</title>
    
    <link rel="icon" type="image/png" href="dragon.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff1100; --black: #000000; --dark: #0a0a0a; --gold: #ffd700; --glass: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; cursor: none; }
        body, html { margin: 0; padding: 0; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* FIRE BACKGROUND */
        #fire-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.7; }
        #cursor-fire { position: fixed; width: 12px; height: 12px; background: var(--red); border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 15px var(--red); }

        /* FLOATING LOGO */
        .floating-logo { width: 150px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 15px var(--red)); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 1000; border-bottom: 2px solid var(--red); }
        .nav-logo { color: var(--red); font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        .section { display: none; padding: 100px 15px 60px; min-height: 100vh; }
        .active { display: block; animation: fadeIn 0.6s ease-out; }

        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .link-card { background: var(--glass); border: 1px solid #222; padding: 20px; border-radius: 20px; text-align: center; transition: 0.4s; }
        .link-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }

        .admin-input { width: 100%; margin-bottom: 10px; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; }
        .glow-btn { padding: 12px 24px; background: transparent; border: 2px solid var(--red); color: var(--red); font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .glow-btn:hover { background: var(--red); color: white; box-shadow: 0 0 20px var(--red); }

        .about-card { max-width: 700px; margin: auto; background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--red); text-align: center; }
        .about-pfp { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--red); margin-bottom: 20px; object-fit: cover; }

        footer { text-align: center; padding: 30px; background: #050505; border-top: 1px solid #222; font-size: 12px; color: #666; }
        .gold-text { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="cursor-fire"></div>
    <canvas id="fire-canvas"></canvas>

    <nav>
        <div class="nav-logo"><img src="dragon.png" style="width:25px;"> <span>𝐀𝐊𝐈𝐘𝐀 龍</span></div>
        <div class="nav-links">
            <a onclick="showPage('home')" style="cursor:pointer; margin-right:15px;">HOME</a>
            <a onclick="showPage('about')" style="cursor:pointer; margin-right:15px;">DEVELOPER</a>
            <a onclick="openShop()" style="color:var(--gold); cursor:pointer;"><i class="fas fa-coins"></i> SHOP</a>
        </div>
        <div id="user-profile-nav" style="display:flex; align-items:center; gap:12px;">
            <div id="nav-tokens-box" style="background:var(--red); padding:5px 10px; border-radius:20px; font-size:12px;">🔥 <span id="nav-tokens">0</span></div>
            <img id="nav-user-pfp" onclick="showPage('profile')" style="width:35px; height:35px; border-radius:50%; border:2px solid var(--red); cursor:pointer;">
        </div>
    </nav>

    <div id="home" class="section active">
        <center>
            <img src="dragon.png" class="floating-logo">
            <h2 id="slogan-text" style="color:var(--gold); font-size:14px; margin-top:20px;"></h2>
        </center>

        <div id="admin-panel" style="display:none; max-width:800px; margin: 40px auto; gap: 20px;">
            <div style="background:rgba(30,0,0,0.9); padding:20px; border-radius:20px; border:1px solid var(--red); flex:1;">
                <h3 style="color:var(--gold);">🐲 POST LINK</h3>
                <input type="text" id="link-t" class="admin-input" placeholder="Name">
                <input type="text" id="link-u" class="admin-input" placeholder="URL">
                <input type="text" id="link-img" class="admin-input" placeholder="Image URL">
                <button class="glow-btn" onclick="addLink()" style="width:100%">PUBLISH</button>
            </div>
            
            <div style="background:rgba(0,0,30,0.9); padding:20px; border-radius:20px; border:1px solid #0055ff; flex:1;">
                <h3 style="color:#00a2ff;">🛠️ EDIT MY DETAILS</h3>
                <input type="text" id="edit-name" class="admin-input" placeholder="Your Name">
                <input type="text" id="edit-pfp" class="admin-input" placeholder="Your DP URL">
                <input type="text" id="edit-school" class="admin-input" placeholder="Your School">
                <textarea id="edit-details" class="admin-input" placeholder="Developer Details"></textarea>
                <button class="glow-btn" onclick="updateDevDetails()" style="width:100%; border-color:#00a2ff; color:#00a2ff;">UPDATE ABOUT ME</button>
            </div>
        </div>

        <div class="link-grid" id="home-grid"></div>
    </div>

    <div id="about" class="section">
        <div class="about-card">
            <img src="dragon.png" id="dev-pfp-display" class="about-pfp">
            <h1 id="dev-name-display" style="color:var(--red); margin:0;">Loading...</h1>
            <p class="gold-text">Founder of AKIYA COMMUNITY</p>
            <div style="text-align:left; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-top:20px;">
                <p><b>School:</b> <span id="dev-school-display">...</span></p>
                <p><b>Website:</b> Official Link Share Platform v2.0</p>
                <p><b>Details:</b> <span id="dev-details-display">...</span></p>
            </div>
            <button class="glow-btn" style="margin-top:20px;" onclick="window.open('https://wa.me/94755751816')">CONTACT ME</button>
        </div>
    </div>

    <footer><p>ALL RIGHTS RESERVED © 2026 | <span class="gold-text">POWERED BY AKIYA</span></p></footer>

    <script>
        const firebaseConfig = { databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ADMIN_EMAIL = "kaviakiya@gmail.com";
        let userData = null;

        window.onload = () => {
            const session = localStorage.getItem('akiya_session');
            if(session) {
                db.ref('users/' + session).on('value', s => {
                    userData = s.val();
                    document.getElementById('nav-user-pfp').src = userData.img;
                    document.getElementById('nav-tokens').innerText = userData.tokens;
                    if(userData.email === ADMIN_EMAIL) {
                        document.getElementById('admin-panel').style.display = 'flex';
                        document.getElementById('nav-tokens-box').style.display = 'none';
                    }
                });
            }
            renderLinks();
            loadDevDetails();
        };

        // --- ADMIN: UPDATE DEVELOPER DETAILS ---
        function updateDevDetails() {
            const name = document.getElementById('edit-name').value;
            const pfp = document.getElementById('edit-pfp').value;
            const school = document.getElementById('edit-school').value;
            const details = document.getElementById('edit-details').value;

            db.ref('siteSettings/developer').update({
                name: name, pfp: pfp, school: school, details: details
            }).then(() => alert("Details Updated Successfully! 🔥"));
        }

        // --- LOAD DEVELOPER DETAILS ---
        function loadDevDetails() {
            db.ref('siteSettings/developer').on('value', s => {
                const d = s.val();
                if(d) {
                    document.getElementById('dev-name-display').innerText = d.name;
                    document.getElementById('dev-pfp-display').src = d.pfp || 'dragon.png';
                    document.getElementById('dev-school-display').innerText = d.school;
                    document.getElementById('dev-details-display').innerText = d.details;
                    
                    // Fill inputs in admin panel if admin
                    if(document.getElementById('edit-name')) {
                        document.getElementById('edit-name').value = d.name;
                        document.getElementById('edit-pfp').value = d.pfp;
                        document.getElementById('edit-school').value = d.school;
                        document.getElementById('edit-details').value = d.details;
                    }
                }
            });
        }

        function addLink() {
            const t = document.getElementById('link-t').value;
            const u = document.getElementById('link-u').value;
            const img = document.getElementById('link-img').value || 'dragon.png';
            if(!t || !u) return;
            db.ref('links').push({ title: t, url: u, img: img, time: Date.now() });
            alert("Published!");
        }

        function renderLinks() {
            const grid = document.getElementById('home-grid');
            db.ref('links').on('value', s => {
                grid.innerHTML = "";
                const data = s.val();
                for(let id in data) {
                    let l = data[id];
                    grid.innerHTML += `<div class="link-card"><img src="${l.img}"><h3>${l.title}</h3><button class="glow-btn" onclick="window.open('${l.url}')">JOIN NOW</button></div>`;
                }
            });
        }

        function showPage(p) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(p).classList.add('active'); }

        const slogan = "SRILANKA NO.1 LINK SHARE PLATFORM";
        let i = 0;
        function type() { if(i < slogan.length) { document.getElementById('slogan-text').innerHTML += slogan.charAt(i); i++; setTimeout(type, 100); } }
        type();

        // FIRE EFFECT (Base Base Logic)
        const canvas = document.getElementById('fire-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        window.onmousemove = (e) => {
            document.getElementById('cursor-fire').style.left = e.clientX+'px';
            document.getElementById('cursor-fire').style.top = e.clientY+'px';
            for(let i=0; i<2; i++) particles.push({x: e.clientX, y: e.clientY, s: Math.random()*2+1, vy: -Math.random()*2, a: 1});
        };
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => { p.y += p.vy; p.a -= 0.02; ctx.fillStyle = `rgba(255,50,0,${p.a})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); if(p.a<=0) particles.splice(i,1); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
