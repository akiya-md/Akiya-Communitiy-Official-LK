
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐀𝐊𝐈𝐘𝐀 龍 | THE ULTIMATE REALM</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff0000; --dark-red: #8b0000; --gold: #ffd700; --black: #050505; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; }
        
        /* NAV BAR FIXES */
        nav { 
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); display: flex; justify-content: space-between; 
            align-items: center; padding: 10px 20px; z-index: 1000; border-bottom: 2px solid var(--red);
        }
        .nav-identity { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-logo-small { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--red); object-fit: cover; }

        .container { max-width: 1200px; margin: 100px auto 40px; padding: 0 15px; }
        .section { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .dragon-card { background: #0f0f0f; border-radius: 15px; border: 1px solid #222; overflow: hidden; }
        .dragon-card img { width: 100%; height: 180px; object-fit: cover; }
        
        /* UI COMPONENTS */
        .btn-dragon { 
            background: linear-gradient(to right, var(--dark-red), var(--red));
            border: none; color: white; padding: 10px 20px; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-family: 'Orbitron';
        }
        .btn-back { background: #333; color: white; margin-bottom: 20px; }
        .input-dragon { 
            background: #111; border: 1px solid #333; color: white; padding: 12px; 
            border-radius: 8px; width: 100%; margin-bottom: 15px;
        }

        .about-card {
            background: rgba(20,0,0,0.8); border: 2px solid var(--red); border-radius: 20px;
            padding: 30px; text-align: center;
        }
        .akiya-dp-large { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--red); margin-bottom: 15px; object-fit: cover; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <div class="nav-identity" onclick="showPage('home')">
            <img src="https://i.ibb.co/vz6mXm3/dragon-logo.png" class="nav-logo-small" id="nav-brand-img">
            <div style="font-family: 'Orbitron'; font-size: 18px; color: var(--red);">AKIYA 龍</div>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="admin-btn" style="display:none; color:var(--gold);" onclick="showPage('admin')"><i class="fas fa-user-shield"></i></div>
            <div id="tokens-display" style="color:var(--gold); font-size:14px;"><i class="fas fa-coins"></i> 0</div>
            <img id="nav-user-img" onclick="showPage('profile')" style="width:35px; height:35px; border-radius:50%; border:1px solid white; cursor:pointer;">
        </div>
    </nav>

    <div class="container">
        
        <div id="home" class="section active">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2 style="font-family:'Orbitron'">REALM <span style="color:red">FEED</span></h2>
                <button class="btn-dragon" onclick="showPage('add-link')">PUBLISH +</button>
            </div>
            <div class="link-grid" id="link-feed"></div>
        </div>

        <div id="add-link" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div style="max-width:500px; margin:auto; background:#0a0a0a; padding:30px; border-radius:20px; border:1px solid var(--red);">
                <h3 style="font-family:'Orbitron'">CREATE POST</h3>
                <input type="text" id="link-name" class="input-dragon" placeholder="Title">
                <input type="text" id="link-url" class="input-dragon" placeholder="URL (https://...)">
                <textarea id="link-desc" class="input-dragon" placeholder="Description"></textarea>
                <input type="file" id="link-file" class="input-dragon" accept="image/*">
                <button class="btn-dragon" style="width:100%" onclick="handleUpload()">PUBLISH NOW</button>
            </div>
        </div>

        <div id="profile" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div style="max-width:500px; margin:auto; text-align:center;">
                <img id="p-img" class="akiya-dp-large">
                <h2 id="p-name-display" style="font-family:'Orbitron'">User</h2>
                <input type="text" id="u-name" class="input-dragon" placeholder="Display Name">
                <input type="text" id="u-edu" class="input-dragon" placeholder="Education">
                <input type="text" id="u-loc" class="input-dragon" placeholder="Location">
                <button class="btn-dragon" style="width:100%" onclick="saveProfile()">UPDATE PROFILE</button>
                <button class="btn-dragon" style="width:100%; margin-top:10px; background:#444;" onclick="showPage('about')">VIEW ABOUT ME</button>
                <p onclick="auth.signOut()" style="color:red; cursor:pointer; margin-top:20px;">Logout</p>
            </div>
        </div>

        <div id="about" class="section">
            <button class="btn-dragon btn-back" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="about-card">
                <img id="ab-img" class="akiya-dp-large">
                <h1 id="ab-name" style="font-family:'Orbitron'; color:var(--red);">AKIYA</h1>
                <div style="text-align:left; max-width:400px; margin:20px auto; border-left:2px solid red; padding-left:15px;">
                    <p><b>Edu:</b> <span id="ab-edu">--</span></p>
                    <p><b>From:</b> <span id="ab-loc">--</span></p>
                </div>
                <p id="ab-bio" style="color:gray;">Akiya Digital Community Founder.</p>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDEmPDHu3jybcYu-nKl5cCHyyWNnerex-w",
            authDomain: "akiya-communitiy-official-lk.firebaseapp.com",
            databaseURL: "https://akiya-communitiy-official-lk-default-rtdb.firebaseio.com/",
            projectId: "akiya-communitiy-official-lk"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();
        let currentU = null;

        auth.onAuthStateChanged(user => {
            if(user) {
                const uid = user.email.replace(/[.#$[\]]/g, "_");
                db.ref('users/' + uid).on('value', snap => {
                    currentU = snap.val();
                    if(!currentU) {
                        currentU = { name: user.displayName, pfp: user.photoURL, tokens: 100, email: user.email };
                        db.ref('users/' + uid).set(currentU);
                    }
                    if(user.email === "kaviakiya@gmail.com") document.getElementById('admin-btn').style.display = 'block';
                    syncUI();
                });
            } else { googleLogin(); }
        });

        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function syncUI() {
            document.getElementById('nav-user-img').src = currentU.pfp;
            document.getElementById('p-img').src = currentU.pfp;
            document.getElementById('nav-brand-img').src = currentU.pfp; // උඹේ logo එක විදිහට පේන්නේ මේක
            document.getElementById('p-name-display').innerText = currentU.name;
            document.getElementById('tokens-display').innerHTML = `<i class="fas fa-coins"></i> ${currentU.tokens}`;
            
            // Sync About Page
            document.getElementById('ab-img').src = currentU.pfp;
            document.getElementById('ab-name').innerText = currentU.name;
            document.getElementById('ab-edu').innerText = currentU.edu || "Student";
            document.getElementById('ab-loc').innerText = currentU.loc || "Sri Lanka";

            loadLinks();
        }

        function saveProfile() {
            const uid = currentU.email.replace(/[.#$[\]]/g, "_");
            db.ref('users/' + uid).update({
                name: document.getElementById('u-name').value || currentU.name,
                edu: document.getElementById('u-edu').value,
                loc: document.getElementById('u-loc').value
            }).then(() => alert("Profile Updated! 🔥"));
        }

        function handleUpload() {
            const name = document.getElementById('link-name').value;
            const url = document.getElementById('link-url').value;
            const desc = document.getElementById('link-desc').value;
            const file = document.getElementById('link-file').files[0];

            if(!name || !url || !file) return alert("ඔක්කොම පුරවපන් මචං!");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                db.ref('links').push({
                    title: name, url: url, desc: desc, img: reader.result,
                    owner: currentU.name, owner_pfp: currentU.pfp, time: Date.now()
                }).then(() => {
                    showPage('home');
                    alert("Published Successfully! 🐉");
                });
            };
        }

        function loadLinks() {
            db.ref('links').limitToLast(20).on('value', snap => {
                const feed = document.getElementById('link-feed');
                feed.innerHTML = "";
                snap.forEach(child => {
                    const l = child.val();
                    feed.innerHTML += `
                        <div class="dragon-card">
                            <img src="${l.img}">
                            <div style="padding:15px;">
                                <h4 style="margin:0; color:red;">${l.title}</h4>
                                <p style="font-size:12px; color:gray;">${l.desc}</p>
                                <a href="${l.url}" target="_blank" class="btn-dragon" style="display:block; text-align:center; text-decoration:none; font-size:12px;">VISIT</a>
                            </div>
                        </div>`;
                });
            });
        }

        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // Simple Background Animation
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
